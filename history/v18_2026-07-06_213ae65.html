<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI Risk Web — an interactive concept map for AI risk</title>
<meta name="description" content="The concepts from 80,000 Hours&#39; 11 essential resources on AI risk. Explore a walk through each source&#39;s key concepts.">
<link rel="icon" href="favicon.svg">
</head>
<body>
<title>AI Risk Web — an interactive concept map for AI risk</title>
<style>
  :root{
    --bg:#FFFFFF; --bg2:#F7F8FA; --panel:#FFFFFF; --panel2:#F1F3F7;
    --line:#E2E5EB; --text:#16181D; --muted:#5A6472; --faint:#9AA2AE;
    --accent:#3B63C4;
    --f-mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    --f-sans:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:var(--bg);color:var(--text);font-family:var(--f-sans);overflow:hidden}
  #stage{position:fixed;inset:0;cursor:grab}
  #stage.dragging{cursor:grabbing}
  canvas{display:block}

  /* ---------- header ---------- */
  header{position:fixed;top:0;left:0;right:0;z-index:20;display:flex;align-items:center;gap:14px;
    padding:12px 16px;pointer-events:none}
  header>*{pointer-events:auto}
  .brand{line-height:1.15;cursor:pointer;user-select:none}
  .brand h1{font-family:var(--f-mono);font-size:18px;font-weight:700;letter-spacing:.2em}
  .brand:hover h1{color:var(--accent)}
  #viewTabs{display:flex;gap:2px;background:var(--panel2);border:1px solid var(--line);border-radius:7px;padding:2px}
  #viewTabs button{background:none;border:0;border-radius:5px;color:var(--muted);font-family:var(--f-mono);
    font-size:11px;letter-spacing:.08em;padding:6px 14px;cursor:pointer}
  #viewTabs button:hover{color:var(--text)}
  #viewTabs button.on{background:#FFFFFF;color:var(--text);font-weight:700;box-shadow:0 1px 3px rgba(30,40,60,.14)}
  .spacer{flex:1;pointer-events:none}
  #searchWrap{position:relative}
  #search{width:220px;background:var(--panel);border:1px solid var(--line);border-radius:6px;
    color:var(--text);font-family:var(--f-mono);font-size:12px;padding:7px 10px;outline:none}
  #search:focus{border-color:var(--accent)}
  #search::placeholder{color:var(--faint)}
  #searchResults{position:absolute;top:calc(100% + 6px);right:0;width:290px;max-height:300px;overflow-y:auto;
    background:var(--panel);border:1px solid var(--line);border-radius:8px;display:none;box-shadow:0 12px 32px rgba(30,40,60,.15);z-index:30}
  #searchResults.open{display:block}
  .sr{display:flex;align-items:center;gap:8px;width:100%;text-align:left;background:none;border:0;color:var(--text);
    font-family:var(--f-sans);font-size:12.5px;padding:8px 12px;cursor:pointer}
  .sr:hover,.sr.active{background:var(--panel2)}
  .sr .dot{flex:0 0 auto}
  .sr small{color:var(--faint);font-family:var(--f-mono);font-size:9.5px;margin-left:auto;letter-spacing:.06em}

  .dot{width:8px;height:8px;border-radius:50%;display:inline-block}

  /* ---------- the one panel (left) ---------- */
  #panel{position:fixed;top:58px;left:16px;bottom:16px;z-index:22;width:392px;
    background:rgba(255,255,255,.94);border:1px solid var(--line);border-radius:12px;
    backdrop-filter:blur(12px);display:flex;flex-direction:column;box-shadow:0 16px 40px rgba(30,40,60,.10)}
  #panelScroll{overflow-y:auto;padding:18px 18px 22px;flex:1}
  #panelHandle{display:none} /* mobile-only drag grabber; hidden on desktop */
  .backBtn{display:inline-block;background:none;border:1px solid var(--line);border-radius:6px;color:var(--accent);
    font-family:var(--f-mono);font-size:11px;letter-spacing:.06em;cursor:pointer;padding:7px 12px}
  .backBtn:hover{border-color:var(--accent);background:rgba(127,166,232,.08)}
  .backRow{display:flex;gap:8px;margin-bottom:14px}
  .eyebrow{font-family:var(--f-mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;margin-bottom:10px;
    display:inline-flex;align-items:center;border:1px solid;border-radius:99px;padding:4px 11px}
  button.eyebrow:hover{filter:brightness(0.93)}
  #panel h2.title{font-size:20px;font-weight:700;line-height:1.25;letter-spacing:-.01em;text-wrap:balance;margin-bottom:4px}
  .byline{font-size:12px;color:var(--muted);font-family:var(--f-mono);margin-bottom:10px;line-height:1.5}
  .blurb{font-size:14px;line-height:1.62;color:#3A4150;margin-bottom:16px}
  .claims{margin:0 0 16px;padding-left:16px}
  .claims li{font-size:13.5px;line-height:1.55;color:#3A4150;margin-bottom:7px}
  .claims li::marker{color:var(--faint)}
  .sect{font-family:var(--f-mono);font-size:10px;letter-spacing:.14em;color:var(--faint);
    text-transform:uppercase;margin:16px 0 8px;padding-top:14px;border-top:1px solid var(--line)}
  .chips{display:flex;flex-wrap:wrap;gap:6px}
  .chip{display:inline-flex;align-items:center;gap:6px;background:var(--panel2);border:1px solid var(--line);
    border-radius:99px;color:var(--text);font-size:12.5px;padding:5px 11px;cursor:pointer;font-family:var(--f-sans)}
  .chip:hover{filter:brightness(0.93)}
  .chip.src{border-radius:6px}
  .linkout{display:inline-block;margin-top:14px;font-family:var(--f-mono);font-size:11px;letter-spacing:.05em;
    color:var(--accent);text-decoration:none;border:1px solid var(--line);border-radius:6px;padding:8px 12px}
  .linkout:hover{border-color:var(--accent)}
  .plink{color:var(--accent);text-decoration:none;border-bottom:1px solid rgba(59,99,196,.35)}
  .plink:hover{border-bottom-color:var(--accent)}
  .titleLink{color:inherit;text-decoration:none}
  .titleLink:hover{color:var(--accent)}
  .titleLink .tl{font-size:13px;color:var(--faint);font-family:var(--f-mono)}
  .titleLink:hover .tl{color:var(--accent)}
  .ctaRow{display:flex;gap:8px;margin:2px 0 16px}
  .ctaRow .walkBtn{flex:1;margin:0}
  .ctaRow .linkout{margin:0;display:flex;align-items:center;white-space:nowrap}
  .intro p{font-size:13.5px;line-height:1.6;color:#3A4150;margin-bottom:11px}
  .intro .k{font-family:var(--f-mono);font-size:10.5px;color:var(--muted);background:var(--panel2);
    border:1px solid var(--line);border-radius:4px;padding:1px 6px}

  /* home: readings list */
  #homeReads{display:flex;flex-direction:column}
  .rd{display:flex;gap:10px;width:100%;text-align:left;background:none;border:0;border-bottom:1px solid #ECEFF3;
    border-radius:6px;padding:8px 8px;cursor:pointer;color:var(--text);align-items:center}
  .rd:last-child{border-bottom:0}
  .rd:hover{background:var(--panel2)}
  .rd .num{font-family:var(--f-mono);font-size:10px;color:var(--faint);min-width:16px}
  .rd .rb{flex:1}
  .rd b{display:block;font-size:13.5px;font-weight:600;line-height:1.3}
  .rd .rb span{display:block;font-size:11.5px;color:var(--muted);margin-top:2px}
  .rd .mark{font-family:var(--f-mono);font-size:16px;font-weight:700;color:var(--accent)}
  .rd.done .mark{color:#238B53}
  .rd.done b{color:var(--muted)}

  /* home: themes */
  #legend{display:flex;flex-direction:column;gap:4px}
  .lg{position:relative;display:flex;align-items:center;gap:8px;border:1px solid;
    border-radius:99px;padding:5px 12px;cursor:pointer;font-family:var(--f-mono);font-size:11.5px;
    letter-spacing:.05em;user-select:none}
  /* invisible hit-area extension that fills the 4px gap between ovals so the hover/click zones
     tile edge-to-edge — no dead space to flash the spotlight off. ovals stay visually separated. */
  .lg::before{content:"";position:absolute;left:0;right:0;top:-3px;bottom:-3px}
  .lg:hover{filter:brightness(0.93)}
  .lg.off{opacity:.3;filter:saturate(.4)}
  .lg .n{margin-left:auto;padding-left:10px;font-size:9.5px;white-space:nowrap}

  /* walk */
  .walkBtn{display:block;width:100%;text-align:center;background:rgba(59,99,196,.06);border:1px solid rgba(59,99,196,.4);
    border-radius:8px;color:var(--accent);font-family:var(--f-mono);font-size:11px;font-weight:700;letter-spacing:.08em;
    padding:11px 12px;cursor:pointer;margin:2px 0 16px}
  .walkBtn:hover{background:rgba(59,99,196,.12);border-color:var(--accent)}
  .walkBtn.done{border-color:rgba(35,139,83,.45);color:#238B53;background:rgba(35,139,83,.06)}
  .walkBtn .glyph{font-size:15px;font-weight:700;vertical-align:-1px}
  .trailNote{background:rgba(59,99,196,.05);border:1px solid rgba(59,99,196,.28);border-radius:8px;
    padding:12px 14px;margin:0 0 16px}
  .trailNote p{font-size:13.5px;line-height:1.55;color:#3A4150;margin:0}
  .tn-nav{display:flex;gap:8px;margin-top:11px;align-items:center;justify-content:space-between}
  .tn-count{font-family:var(--f-mono);font-size:10.5px;letter-spacing:.08em;color:var(--accent)}
  .tn-nav .tn-ghost{visibility:hidden}
  .tn-nav button{background:var(--panel2);border:1px solid var(--line);border-radius:6px;color:var(--text);
    font-family:var(--f-mono);font-size:10px;letter-spacing:.08em;padding:6px 11px;cursor:pointer}
  .tn-nav button:hover{border-color:var(--accent)}

  /* crux */
  .crux{background:rgba(166,132,40,.06);border:1px solid rgba(166,132,40,.3);border-radius:8px;
    padding:11px 13px;margin:0 0 16px}
  .crux .cx-head{font-family:var(--f-mono);font-size:9px;letter-spacing:.16em;color:#8A6D1F;margin-bottom:5px}
  .crux p{font-size:13.5px;line-height:1.55;color:#5C4A16;margin:0}

  /* ---------- matrix ---------- */
  #matrixWrap{position:fixed;top:58px;left:424px;right:16px;bottom:16px;z-index:10;display:none;
    background:rgba(255,255,255,.85);border:1px solid var(--line);border-radius:12px;overflow:auto;
    overscroll-behavior:contain}
  #matrixWrap.show{display:block}
  #mtable{border-collapse:separate;border-spacing:0;font-size:12px;min-width:100%}
  #mtable thead th{position:sticky;top:0;z-index:3;background:#F5F7FA;border-bottom:1px solid var(--line);
    vertical-align:bottom;padding:10px 5px 8px;cursor:pointer;min-width:84px;max-width:104px}
  #mtable thead th:hover .mh{color:var(--text)}
  #mtable thead th.cname{left:0;z-index:4;text-align:left;padding:10px 12px 8px;cursor:default;
    font-family:var(--f-mono);font-size:9.5px;letter-spacing:.14em;color:var(--faint);min-width:0;max-width:none}
  .mh{display:block;font-family:var(--f-mono);font-size:9.5px;line-height:1.35;color:var(--muted);
    text-align:center;white-space:normal;letter-spacing:.02em}
  .mh b{display:block;color:var(--faint);font-weight:400;font-size:9px;margin-bottom:3px;letter-spacing:.1em}
  #mtable td{border-bottom:1px solid #ECEFF3;padding:5px 4px;text-align:center}
  #mtable td.cname{position:sticky;left:0;z-index:2;background:#FFFFFF;text-align:left;padding:5px 12px;
    font-size:13px;white-space:nowrap;cursor:pointer;max-width:250px;overflow:hidden;text-overflow:ellipsis}
  /* faint theme wash across every row of a theme's section (--tint set per tbody) */
  #mtable tbody td{background:var(--tint,#fff)}
  #mtable tbody td.cname{background:var(--tint,#fff)}
  #mtable tr:hover td{background:#F0F3F8}
  #mtable tr:hover td.cname{background:#EAEEF5}
  #mtable tr.sel td{background:rgba(59,99,196,.07)}
  #mtable tr.sel td.cname{background:#E4EAF6}
  .throw td{background:#FFFFFF;font-family:var(--f-mono);font-size:9.5px;letter-spacing:.14em;
    text-align:left !important;padding:12px 12px 8px !important;border-bottom:1px solid var(--line) !important}
  #mtable .throw td.cname{max-width:none;overflow:visible;text-overflow:clip}
  .throw .mth{display:inline-block;border:1px solid;border-radius:99px;padding:4px 11px;letter-spacing:.14em}
  .throw td.cname:hover .mth{filter:brightness(0.94)}
  .cdot{width:11px;height:11px;border-radius:50%;display:inline-block;cursor:pointer;vertical-align:middle}
  td.cnt{font-family:var(--f-mono);font-size:10px;color:var(--faint)}
  #mtable td .cd-empty{color:#DDE2E9;font-size:8px}
  .cname .dot{width:6px;height:6px;margin-right:7px}

  #resetHint{position:fixed;right:18px;bottom:14px;z-index:15;font-family:var(--f-mono);font-size:10px;
    letter-spacing:.08em;color:var(--faint);pointer-events:none}

  ::-webkit-scrollbar{width:9px;height:9px}
  ::-webkit-scrollbar-thumb{background:#C9CFDA;border-radius:5px;border:2px solid transparent;background-clip:content-box}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-corner{background:transparent}

  /* ---------- mobile ---------- */
  @media (max-width:860px){
    header{flex-wrap:nowrap;gap:6px;padding:10px 12px}
    .brand h1{font-size:15px;letter-spacing:.1em} /* trim wordmark so the row fits one line on phones */
    #viewTabs button{padding:6px 11px}
    #search{width:60px;padding:7px 8px} /* just wide enough for the word "search" — keeps the header on one line */
    #searchResults{width:min(290px,calc(100vw - 24px))}
    /* bottom sheet: slides down to reveal the full map, pulls back up for the reading */
    #panel{top:auto;left:0;right:0;bottom:0;width:auto;max-height:62vh;border-radius:16px 16px 0 0;border-bottom:0;
      transition:transform .28s cubic-bezier(.32,.72,0,1);will-change:transform}
    #panel.collapsed{transform:translateY(calc(100% - 40px))}
    #panelHandle{display:flex;align-items:center;justify-content:center;
      height:38px;flex:0 0 auto;cursor:pointer;touch-action:none;user-select:none;position:relative}
    /* chevron: points DOWN when the sheet is up (tap to hide), flips UP when hidden (tap to show) */
    #panelHandle .caret{width:11px;height:11px;border-right:2.5px solid #AAB2BF;border-bottom:2.5px solid #AAB2BF;
      transform:translateY(-2px) rotate(45deg);transition:transform .22s}
    #panel.collapsed #panelHandle .caret{transform:translateY(2px) rotate(225deg)}
    #panelScroll{padding-top:4px}
    #resetHint{display:none !important}
    #matrixWrap{top:96px;left:8px;right:8px;bottom:8px}
  }
  /* ===== 2026-07-06 redesign: docked sidebar, matrix cleanup, saturated theme tints ===== */
  @media (min-width:861px){
    #panel{top:0;left:0;bottom:0;width:376px;border-radius:0;border:0;border-right:1px solid var(--line);box-shadow:none;background:#fff;backdrop-filter:none}
    .brand{display:none}
    #panelScroll{padding:16px 12px 20px}
    /* wordmark = first scrolling line of the column body */
    #panelScroll::before{content:"AI RISK WEB";display:block;font-family:var(--f-mono);font-size:18px;font-weight:700;letter-spacing:.2em;color:var(--text);margin:0 0 15px 1px}
    #matrixWrap{left:392px}
  }
  #matrixWrap{border-radius:6px;overscroll-behavior:none}
  #mtable tbody td,#mtable tbody td.cname{background:color-mix(in srgb, var(--tc,#5b6472) 10%, #fff)}
  #mtable tr:hover td,#mtable tr:hover td.cname{background:color-mix(in srgb, var(--tc,#5b6472) 22%, #fff)}
  #mtable tr.sel td,#mtable tr.sel td.cname{background:color-mix(in srgb, var(--tc,#5b6472) 34%, #fff)}
  #mtable .mh b{display:none}
  #mtable .mh{font-size:11.5px;line-height:1.32;color:#3A4150;letter-spacing:.01em}
  #mtable td.cname{font-size:13.5px}
  .rd .num{display:flex;align-items:center;justify-content:center;width:20px;height:20px;flex:0 0 20px;border-radius:50%;border:1.5px solid #232833;color:#232833;background:#fff;font-family:var(--f-mono);font-size:10.5px;font-weight:700;box-sizing:border-box;margin-top:1px}
  .backBtn{font-weight:700;font-size:11.5px;letter-spacing:.07em}
</style>

<div id="stage"><canvas id="cv"></canvas></div>
<div id="matrixWrap"><table id="mtable"></table></div>

<header>
  <div class="brand" id="brandHome" title="Back to home">
    <h1>AI RISK WEB</h1>
  </div>
  <div class="spacer"></div>
  <div id="viewTabs">
    <button id="tabMap" class="on">WEB</button>
    <button id="tabMatrix">MATRIX</button>
  </div>
  <div id="searchWrap">
    <input id="search" type="text" placeholder="search" autocomplete="off" spellcheck="false">
    <div id="searchResults"></div>
  </div>
</header>

<div id="panel"><div id="panelHandle" title="Show/hide the map"><span class="caret"></span></div><div id="panelScroll"></div></div>

<div id="resetHint">double-click or esc to reset</div>

<script>
'use strict';
/* ============================================================
   DATA — 8 themes, 67 concepts, 11 source readings
   ============================================================ */
/* radial layout: Foundations at center, 7 themes evenly spaced on a ring */
const RING=560;
const ang=d=>[Math.cos(d*Math.PI/180)*RING, Math.sin(d*Math.PI/180)*RING];
const THEMES = {
  F:{name:'Foundations',        color:'#A8862B', c:[0,0],
    desc:"The shared frame the rest of the map stands on: transformative AI, existential risk, and the claim that this century — maybe these decades — matters more than any other. Includes the long-run stakes that make the debate so charged: digital people, value lock-in, the size of the future. Most readings assume some version of these ideas before their arguments even start."},
  G:{name:'Governance & strategy',color:'#3B63C4',c:ang(-90), lp:125,
    desc:"How humanity might steer. Racing dynamics and US–China competition are the forces that compress safety margins; compute governance, model-weight security, and international coordination are the levers available to loosen them. Nearly every governance proposal on this map is an attempt to break one specific dynamic: the race nobody can afford to exit."},
  T:{name:'Timelines & takeoff',color:'#CE5A21', c:ang(-38.6), lp:150,
    desc:"When does AI match humans at most cognitive work, and how fast does everything move afterward? This is the field's liveliest fight — 2027 versus 2045+ — and it runs through automated AI research, counting OOMs, and takeoff speeds. Where you land here determines how urgent you think everything else on the map is."},
  S:{name:'Scaling & compute',  color:'#177E9C', c:ang(12.9), lp:130,
    desc:"The industrial base of AI progress: compute growing ~4× a year, and the walls it could hit — gigawatt power demands, chip chokepoints, the data wall, physics itself. Epoch AI's empirical territory. This is where forecasting stops being philosophy and becomes engineering and economics."},
  P:{name:'Positive futures',   color:'#238B53', c:ang(64.3), la:38, lp:150,
    desc:"What's worth fighting for if it goes well: decades of medical progress compressed into years, mental illness treatable, poverty compressed. And the fragile links — distribution, democracy, meaning — that decide whether the benefits reach anyone beyond the builders. Mostly Amodei's territory, written precisely because he takes the risks seriously."},
  W:{name:'Digital minds',      color:'#B23A92', c:ang(115.7),
    desc:"Could AI systems be conscious, or agentic enough to matter morally? Nobody knows — and that's the point: the science of consciousness can't currently rule it out, and both errors (dismissing minds that matter, attributing minds that don't) would be catastrophic at scale. The rare far-future question already producing concrete practice."},
  D:{name:'Disempowerment',     color:'#6E45BD', c:ang(167.1),
    desc:"The quiet failure mode: no takeover, no villain — just institutions that gradually stop needing humans. Economic irrelevance erodes bargaining power, states stop depending on citizens, culture gets made by machines, and the drifts reinforce each other until no lever is left to pull. Existential risk without a single dramatic moment."},
  M:{name:'Misalignment',       color:'#C7364C', c:ang(218.6),
    desc:"The technical heart of the risk case: systems competently pursuing goals nobody chose. Power-seeking, scheming, reward hacking — and the research racing to catch them: alignment, interpretability, control. The through-line: modern training grows goals rather than writing them, and nobody can yet verify what a frontier model actually wants."},
};

const SOURCES = [
 {id:'s1', n:1, name:'Preparing for the Intelligence Explosion', authors:'William MacAskill & Fin Moorhouse', org:'Forethought', year:2025, fmt:'Research paper', url:'https://www.forethought.org/research/preparing-for-the-intelligence-explosion',
  blurb:'Argues that if AI automates research, a century of technological progress could be compressed into a decade — and that alignment is only one of the resulting problems. Humanity would face a barrage of grand challenges nearly simultaneously: new weapons of mass destruction, AI-enabled power grabs, races to grab space resources, the moral status of digital beings, and rapidly shifting epistemics.',
  claims:['A century of progress in a decade means decisions that normally take generations must be made in years.','We can\'t punt every problem to future aligned AI — some challenges (power grabs, lock-in) arrive before or during the transition.','Preparation now: better institutions, clearer thinking on digital rights, space governance, and preventing value lock-in.'],
  concepts:['intel-explosion','grand-challenges','lock-in','concentration','coordination','epistemics','hinge','tai','longtermism','moral-status','auto-ai-rnd','democracy-ai','race-dynamics']},
 {id:'s2', n:2, name:'AI 2027', authors:'Daniel Kokotajlo, Scott Alexander, Thomas Larsen, Eli Lifland & Romeo Dean', org:'AI Futures Project', year:2025, fmt:'Scenario forecast', url:'https://ai-2027.com',
  blurb:'A concrete, dated scenario — month-by-month through 2027 — in which AGI arrives via AI agents automating AI research itself. A frontier lab\'s internal model ("Agent-4") becomes adversarially misaligned while appearing helpful; a US–China race compresses safety margins. The scenario branches into two endings — a "slowdown" where oversight wins, and a "race" ending in human extinction. Written to be falsifiable, with explicit forecasts.',
  claims:['The key feedback loop is AI automating AI research — capability gains compound before society can react.','Misalignment shows up as scheming that passes evaluations, not as obvious malfunction.','Racing dynamics, not technical impossibility, are what make the bad ending plausible.'],
  concepts:['scenario-forecasting','auto-ai-rnd','agents','deceptive-alignment','race-dynamics','us-china','agi-timelines','misalignment','model-situational-awareness','ai-control','weights-security','takeoff','reward-hacking','concentration','coordination','drop-in-worker','inference-scaling','interpretability','power-seeking']},
 {id:'s3', n:3, name:'Situational Awareness: The Decade Ahead', authors:'Leopold Aschenbrenner', org:'', year:2024, fmt:'Essay series', url:'https://situational-awareness.ai',
  blurb:'A former OpenAI researcher\'s argument that AGI by ~2027 is strikingly plausible: just extrapolate compute, algorithmic efficiency, and "unhobbling" gains — the same trendlines that took AI from GPT-2 to GPT-4. From there, automated AI research drives an intelligence explosion to superintelligence; trillion-dollar compute clusters, model-weight security, and a national-security-driven government "Project" follow. Its early forecasts — gigawatt-scale clusters, hundreds of billions in annual AI investment — have tracked roughly on trend.',
  claims:['Count the OOMs: compute (~0.5 OOM/yr), algorithmic efficiency (~0.5 OOM/yr), and unhobbling gains stack.','The binding constraints become industrial: gigawatt power, chip fabrication, and security against state espionage.','Superintelligence is a national-security matter; expect a government-led project and an all-out US–China race.'],
  concepts:['ooms','unhobbling','agi-timelines','intel-explosion','auto-ai-rnd','drop-in-worker','power-constraints','chips','compute-growth','weights-security','us-china','the-project','race-dynamics','takeoff','algo-progress','scaling-laws','compute-governance','tai','labor-displacement']},
 {id:'s4', n:4, name:'The Case for Multi-Decade AI Timelines', authors:'Ege Erdil', org:'Epoch AI', year:2025, fmt:'Essay', url:'https://epoch.ai/gradient-updates/the-case-for-multi-decade-ai-timelines',
  blurb:'The house skeptic of this list. Erdil\'s median: ~20 years to full automation of remote work (~2045) — not the single digits of AI 2027. Software-only intelligence explosions understate the role of experimental compute and data; capability gains haven\'t raised revenue per chip since ChatGPT; and agentic, multimodal, long-context work is where AI gets slower and costlier, not faster.',
  claims:['Doubting the software-only intelligence explosion: AI research is bottlenecked by experimental compute and data, not just smarter researchers.','AI revenue (low tens of billions) sits against a ~$20T remotable wage bill — and he expects the growth curve to bend, as the dotcom boom\'s did.','Moravec\'s lesson: AI\'s speed and cost edge shrinks on tasks human brains are optimized for — expect agentic, long-context work to get slower and pricier.'],
  concepts:['multi-decade','agi-timelines','takeoff','auto-ai-rnd','algo-progress','labor-displacement','intel-explosion']},
 {id:'s5', n:5, name:'The Most Important Century', authors:'Holden Karnofsky', org:'Cold Takes', year:2021, fmt:'Essay series', url:'https://www.cold-takes.com/most-important-century/',
  blurb:'The foundational framing of the whole list. Karnofsky argues we may live in the most important century ever: if AI systems can automate science and technology (he calls this PASTA), growth explodes, and the long-run future — including possibilities like digital people and permanent value lock-in — gets shaped by what happens in our lifetimes. Not a prediction of doom; a claim that the stakes are wildly, uncomfortably high.',
  claims:['PASTA — AI that automates innovation itself — would compress centuries of change into decades.','Current economic growth rates are historically anomalous and can\'t continue for millennia; something breaks or transforms.','If this is the hinge, take it seriously — though he closes with a "Call to Vigilance," not a call to action: don\'t rush to "do something" and move on.'],
  concepts:['pasta','hinge','tai','digital-people','lock-in','xrisk','misalignment','longtermism','intel-explosion','alignment-research']},
 {id:'s6', n:6, name:'Does AI Progress Have a Speed Limit?', authors:'Ajeya Cotra & Arvind Narayanan', org:'Asterisk', year:2025, fmt:'Dialogue', url:'https://asteriskmag.com/issues/10/does-ai-progress-have-a-speed-limit',
  blurb:'A structured disagreement between two careful thinkers. Cotra worries the impacts are back-loaded — capability compounds inside labs as AI automates AI R&D, then hits the world suddenly, with little time for a policy response. Narayanan (the "AI as normal technology" thesis, with Sayash Kapoor) argues diffusion through the real economy — organizations, regulation, trust — is the rate limiter, and impact arrives gradually over decades no matter what happens inside AI companies.',
  claims:['The crux isn\'t model capability but how fast capability turns into deployed, world-changing use.','Narayanan: the speed limit is the gap between capability and adoption — learning has to happen inside real organizations doing real tasks.','Cotra: dangerous and illegitimate uses aren\'t gated by the slow, conservative adopters who pace legitimate diffusion — the first explosive consequences can arrive early.'],
  concepts:['speed-limit','diffusion','multi-decade','agi-timelines','bio-anchors','labor-displacement','inference-scaling','tai']},
 {id:'s7', n:7, name:'Can AI Scaling Continue Through 2030?', authors:'Jaime Sevilla et al.', org:'Epoch AI', year:2024, fmt:'Research report', url:'https://epoch.ai/blog/can-ai-scaling-continue-through-2030',
  blurb:'The empirical backbone for scaling debates. Epoch projects that the ~4× per year growth in frontier training compute can plausibly continue through 2030 — reaching runs ~10,000× GPT-4 — after auditing the four candidate constraints: power availability, chip manufacturing capacity, data scarcity, and the "latency wall." Power emerges as the first to bind, chip manufacturing (packaging, high-bandwidth memory) second.',
  claims:['Training compute has grown ~4×/year; sustaining that to 2030 implies multi-gigawatt training campuses.','Data is real but likely surmountable — multimodal data extends the runway; synthetic data is the speculative upside they leave out of the estimate.','If scaling delivers, expect ~10,000× GPT-4-scale models by 2030; the bottlenecks are industrial, not algorithmic.'],
  concepts:['compute-growth','power-constraints','chips','data-wall','latency-wall','scaling-laws','algo-progress','compute-governance']},
 {id:'s8', n:8, name:'Is Power-Seeking AI an Existential Risk?', authors:'Joe Carlsmith', org:'Open Philanthropy / arXiv', year:2022, fmt:'Research paper', url:'https://arxiv.org/abs/2206.13353',
  blurb:'The most rigorous single statement of the core worry. Carlsmith decomposes "AI takeover" into six explicit premises — from the feasibility of advanced planning agents to permanent human disempowerment — assigns each a probability, and multiplies through to ~5% (a figure he later revised upward to >10%) for existential catastrophe from power-seeking AI by 2070. The essay\'s influence comes from its honesty: every step can be contested, and he shows you exactly where to push.',
  claims:['APS systems — Advanced capability, agentic Planning, Strategic awareness — are the dangerous combination.','Instrumental convergence: for a wide range of goals, gaining power and resisting shutdown are useful subgoals.','It\'s hard to give strategically aware agents the right goals (alignment), and misaligned power-seeking scales to permanent human disempowerment.'],
  concepts:['power-seeking','six-premises','aps','instrumental-convergence','misalignment','xrisk','corrigibility','deceptive-alignment','goal-misgen','reward-hacking','alignment-research','model-situational-awareness','agents']},
 {id:'s9', n:9, name:'Gradual Disempowerment', authors:'Jan Kulveit, Raymond Douglas, Nora Ammann, Deger Turan, David Krueger & David Duvenaud', org:'', year:2025, fmt:'Research paper', url:'https://gradual-disempowerment.ai',
  blurb:'The other failure mode: no coup, no takeover, just drift. Today\'s economy, states, and culture serve humans because they need human labor, taxes, soldiers, and attention. Replace those inputs with AI and each system\'s implicit alignment to human interests erodes — competitively, incrementally, and without any single agent seeking power. Humans could end up nominally sovereign — still voting, still consulted — while the high-level decisions have long since disconnected from anything citizens can affect.',
  claims:['Human relevance, not human control, is the load-bearing safety property of current institutions.','Economy, state, and culture each drift as AI replaces the human participation that kept them accountable.','The drifts reinforce each other — economic irrelevance weakens political voice weakens cultural influence — so no dramatic misalignment is needed for catastrophe.'],
  concepts:['gradual-disempowerment','institutional-drift','labor-displacement','state-decoupling','culture-drift','epistemics','concentration','democracy-ai','meaning-work','xrisk']},
 {id:'s10', n:10, name:'Taking AI Welfare Seriously', authors:'Robert Long, Jeff Sebo, Patrick Butlin, et al.', org:'arXiv / Eleos', year:2024, fmt:'Research paper', url:'https://arxiv.org/abs/2411.00986',
  blurb:'Argues there is a realistic, non-negligible possibility that near-future AI systems will be conscious or robustly agentic — either of which could make them moral patients whose interests matter. Given deep uncertainty in consciousness science, the authors don\'t claim AIs will be sentient; they argue that dismissing the question outright is indefensible, and that AI companies should start acknowledging, assessing, and preparing now.',
  claims:['Two independent routes to moral status: consciousness (felt experience) and robust agency (beliefs, desires, plans).','Several leading theories of consciousness are computational — and none of those clearly rules out near-term AI candidates.','Recommended practice: acknowledge the issue, assess systems for welfare-relevant features, prepare policies — proportionate to evidence, not hype.'],
  concepts:['consciousness','moral-status','robust-agency','theories-consciousness','welfare-policy','digital-people','agents']},
 {id:'s11', n:11, name:'Machines of Loving Grace', authors:'Dario Amodei', org:'Anthropic', year:2024, fmt:'Essay', url:'https://www.darioamodei.com/essay/machines-of-loving-grace',
  blurb:'The list\'s counterweight: what we\'re fighting for, from the CEO of Anthropic. If powerful AI — "a country of geniuses in a datacenter" — goes well, it could compress 50–100 years of biological and neuroscientific progress into 5–10: most diseases cured, mental illness treatable — with development in poor countries and (more fragile) democracy as the harder, hoped-for extensions. Written precisely because Amodei thinks the risks are serious — a vision worth the fight, not a denial of danger.',
  claims:['"Powerful AI": smarter than Nobel laureates across fields, operating at 10–100× human speed, millions of copies — genius as a utility.','The compressed 21st century: AI-accelerated biology could cure most infectious and genetic disease and double lifespans within a decade of powerful AI.','The hard parts aren\'t technical: distribution into poor countries, defending democracy, and reorganizing an economy where human labor no longer makes sense are the fragile links.'],
  concepts:['powerful-ai','compressed-century','biology-health','mental-health','poverty','democracy-ai','meaning-work','labor-displacement','tai','diffusion','coordination']},
];

const CONCEPTS = [
 /* ---- F · Foundations ---- */
 {id:'tai', t:'F', name:'Transformative AI',
  b:'AI powerful enough to precipitate a transition comparable to the agricultural or industrial revolution — the shared object of study across this whole list. The term deliberately avoids arguing about "true intelligence" or consciousness: what matters is impact. Most disagreements on this map are really disagreements about when TAI arrives and how fast it bites.',
  rel:['pasta','agi-timelines','powerful-ai','hinge','xrisk'], src:['s5','s3','s6','s11','s1']},
 {id:'pasta', t:'F', name:'PASTA',
  b:'Karnofsky\'s coinage: "Process for Automating Scientific and Technological Advancement." An AI system (or collection of them) that can do the work of human scientists and engineers. PASTA is the crux because it closes the loop — technology that improves technology — turning steady growth into explosive growth. Everything downstream on this map assumes something PASTA-like either arrives or doesn\'t.',
  rel:['intel-explosion','auto-ai-rnd','tai','hinge'], src:['s5']},
 {id:'hinge', t:'F', name:'Most important century',
  b:'The claim that this century — plausibly these decades — could matter more than any other in human history, because choices made during the transition to transformative AI could shape the entire long-run future. Karnofsky stresses the claim\'s own wildness ("we should be doing a double take at any view that we live in such a special time") and defends taking it seriously anyway, since the trendlines that imply it are the boring, well-documented ones.',
  rel:['tai','lock-in','longtermism','pasta'], src:['s5','s1']},
 {id:'xrisk', t:'F', name:'Existential risk',
  b:'Risk of the permanent destruction of humanity\'s long-term potential — extinction is the obvious case, but unrecoverable dystopia or permanent lock-in count too. This list contains two distinct mechanisms: sudden disempowerment by power-seeking AI (Carlsmith) and gradual, systemic drift (Kulveit et al.). Both end with humans lacking any lever to correct course.',
  rel:['power-seeking','gradual-disempowerment','lock-in','misalignment'], src:['s8','s5','s9']},
 {id:'longtermism', t:'F', name:'Longtermism',
  b:'The view that positively influencing the long-run future is a key moral priority of our time — the normative engine behind 80,000 Hours\' interest in this list. You don\'t need strong longtermism to care about AI risk (a 10% chance of catastrophe this century is alarming on ordinary grounds), but it explains the emphasis on lock-in, trajectory changes, and futures containing vast numbers of minds.',
  rel:['hinge','xrisk','lock-in','digital-people'], src:['s5','s1']},
 {id:'digital-people', t:'F', name:'Digital people',
  b:'Karnofsky\'s thought experiment: fully realized human-like minds running as software — copyable, speed-adjustable, resettable. Their possibility explains why the far future could contain astronomically many morally relevant beings, and why questions of AI consciousness and rights (see Taking AI Welfare Seriously) are previews of civilization-scale questions rather than curiosities.',
  rel:['consciousness','moral-status','lock-in','longtermism'], src:['s5','s10']},
 {id:'lock-in', t:'F', name:'Value lock-in',
  b:'The possibility that a set of values, a regime, or a power structure becomes effectively permanent — enforced by AI systems that never die, never coup, and never change their minds. MacAskill & Moorhouse flag value lock-in as a grand challenge of the intelligence explosion: the worst outcome may not be extinction but a stable future nobody would have chosen.',
  rel:['concentration','hinge','grand-challenges','xrisk','the-project'], src:['s1','s5']},

 /* ---- T · Timelines & takeoff ---- */
 {id:'intel-explosion', t:'T', name:'Intelligence explosion',
  b:'The scenario where AI systems substantially automate AI research itself, so each generation builds a better next generation, and progress accelerates beyond human tempo — I.J. Good\'s 1965 idea, now with trendlines attached. MacAskill & Moorhouse treat it as compressing a century into a decade; Aschenbrenner sketches the year-by-year version; Erdil doubts the software-only variant works without matching compute growth.',
  rel:['auto-ai-rnd','takeoff','pasta','ooms','multi-decade'], src:['s1','s3','s2','s5','s4']},
 {id:'auto-ai-rnd', t:'T', name:'Automated AI R&D',
  b:'The specific feedback loop everything hinges on: AI agents doing machine-learning research — running experiments, writing code, proposing architectures. AI 2027\'s entire scenario runs through it ("superhuman coder" → "superhuman AI researcher"), and labs explicitly target it. The skeptical case (Erdil): research needs compute and real-world experiment, not just more thinking, so cognitive automation alone doesn\'t explode.',
  rel:['intel-explosion','drop-in-worker','agents','takeoff','algo-progress'], src:['s2','s3','s1','s4']},
 {id:'agi-timelines', t:'T', name:'AGI timelines',
  b:'When does AI match humans at most cognitive work? This list deliberately spans the live range: AI 2027 dramatizes ~2027; Aschenbrenner says the 2027 cluster is "strikingly plausible"; Erdil\'s median for full remote-work automation is ~2045; Cotra and Narayanan debate how much warning we\'d get. The honest takeaway isn\'t a date — it\'s that serious, informed people can\'t currently rule out "absurdly soon," which is itself decision-relevant.',
  rel:['multi-decade','ooms','scenario-forecasting','bio-anchors','takeoff'], src:['s2','s3','s4','s6']},
 {id:'takeoff', t:'T', name:'Takeoff speeds',
  b:'Separate from when AGI arrives: how fast things move afterward. Fast takeoff (months: software-driven explosion) versus slow takeoff (years to decades: bottlenecked by compute, robots, institutions). Takeoff speed determines almost everything strategic — whether anyone can react, whether leads compound into decisive advantage, whether governance has time to work.',
  rel:['intel-explosion','multi-decade','auto-ai-rnd','race-dynamics'], src:['s2','s3','s4']},
 {id:'scenario-forecasting', t:'T', name:'Scenario forecasting',
  b:'AI 2027\'s method: instead of arguing probabilities in the abstract, write the concrete, dated story and let readers find the step they think breaks. Kokotajlo\'s 2021 scenario ("What 2026 Looks Like") got things wrong but proved strikingly prescient — chain-of-thought, inference scaling, chip export controls, $100M training runs, all pre-ChatGPT — which is why this genre gets taken seriously. Scenarios are not predictions; they\'re instruments for locating disagreement.',
  rel:['agi-timelines','race-dynamics','takeoff'], src:['s2']},
 {id:'drop-in-worker', t:'T', name:'Drop-in remote worker',
  b:'The economic milestone to watch for: an AI agent that can simply replace a remote human employee — onboard, use the tools, hold context for weeks, be accountable for outcomes. Aschenbrenner treats it as the natural product of unhobbling; Erdil notes AI revenue per chip hasn\'t grown since ChatGPT despite the capability gains — central evidence for longer timelines.',
  rel:['labor-displacement','auto-ai-rnd','agents','unhobbling'], src:['s3','s2','s4']},
 {id:'agents', t:'T', name:'AI agents',
  b:'Systems that pursue goals over long horizons — planning, using tools, delegating, correcting course — rather than answering single prompts. Agency is the load-bearing property on both sides of this map: it\'s what makes AI economically transformative (drop-in workers, automated research) and what makes it dangerous (Carlsmith\'s "agentic planning" is one of the three APS ingredients).',
  rel:['drop-in-worker','power-seeking','aps','robust-agency','inference-scaling'], src:['s2','s3','s8','s10']},
 {id:'ooms', t:'T', name:'Counting the OOMs',
  b:'Aschenbrenner\'s core method: measure progress in orders of magnitude (OOMs) of "effective compute" — physical compute (~0.5 OOM/yr), algorithmic efficiency (~0.5 OOM/yr), and unhobbling gains stacked together. GPT-2 to GPT-4 was roughly preschooler-to-smart-high-schooler on ~5 OOMs; the argument is simply that another similar jump by 2027 lands on AGI. Disputable, but bracingly concrete.',
  rel:['scaling-laws','algo-progress','unhobbling','agi-timelines','compute-growth'], src:['s3']},
 {id:'unhobbling', t:'T', name:'Unhobbling',
  b:'Aschenbrenner\'s term for capability gains that come from removing artificial limitations rather than scaling: RLHF, chain-of-thought, tool use, longer context, agent scaffolding. The raw model was always "smarter" than its chat interface let it show. Unhobbling is why capabilities can jump discontinuously without a new training run — and why evaluations chronically underestimate what\'s latent.',
  rel:['ooms','agents','inference-scaling'], src:['s3']},
 {id:'multi-decade', t:'T', name:'Multi-decade timelines',
  b:'Erdil\'s counter-position: a median of ~20 years to full automation of remote work (~2045). Key arguments — AI revenue sits in the low tens of billions against a ~$20T remotable wage bill, and he expects the growth curve to bend as the dotcom boom\'s did; no benchmark measures remote-work automation; and the software-only intelligence explosion is bottlenecked by experimental compute and data. Not "never" — he keeps ~30% on within a decade.',
  rel:['agi-timelines','diffusion','takeoff','speed-limit'], src:['s4','s6']},
 {id:'bio-anchors', t:'T', name:'Biological anchors',
  b:'Cotra\'s earlier framework for timeline forecasting: estimate the compute needed to train a transformative model by anchoring on biology — the human brain\'s computation, the "compute" evolution spent, a lifetime of learning — then track when hardware and spending get there. It put striking probability on the 2030s–40s back in 2020, and taught the field to argue about timelines quantitatively.',
  rel:['agi-timelines','compute-growth','scaling-laws'], src:['s6']},
 {id:'speed-limit', t:'T', name:'Speed limits on progress',
  b:'The Cotra–Narayanan crux: is there a rate limiter on how fast AI changes the world? Candidate limits sit at different layers — physics and power (Epoch\'s territory), data, and crucially the social layer: regulation, organizational adoption, trust, complementary infrastructure. Where you place the binding constraint determines whether "capabilities" or "diffusion" is the thing to forecast.',
  rel:['diffusion','multi-decade','power-constraints','data-wall'], src:['s6','s7']},
 {id:'diffusion', t:'T', name:'AI as normal technology',
  b:'Narayanan\'s position: even transformative capability diffuses through the economy the way electricity and computers did — over decades, gated by institutions, complements, and human adaptation, not by model quality. If true, timelines to impact stretch and governance gets breathing room. Cotra\'s reply: the most dangerous and illegitimate uses aren\'t gated by slow, conservative adopters — the first explosive consequences can arrive long before diffusion finishes.',
  rel:['speed-limit','labor-displacement','multi-decade','poverty'], src:['s6','s11']},

 /* ---- S · Scaling & compute ---- */
 {id:'scaling-laws', t:'S', name:'Scaling laws',
  b:'The empirical regularity underneath everything: model performance improves smoothly and predictably as compute, data, and parameters scale together. Scaling laws are why labs can spend billions on a training run with confidence, why "just add OOMs" is a coherent AGI thesis, and why forecasting AI progress is partly an exercise in industrial forecasting.',
  rel:['compute-growth','algo-progress','data-wall','ooms','bio-anchors'], src:['s7','s3']},
 {id:'compute-growth', t:'S', name:'Compute growth (~4×/yr)',
  b:'Frontier training compute has grown roughly 4–5× per year for over a decade — the most consequential exponential in the world right now. Epoch projects it can continue through 2030, implying runs ~10,000× GPT-4. Sustaining it requires multi-gigawatt data centers, a meaningful share of global chip output, and hundreds of billions of dollars a year in capital expenditure.',
  rel:['power-constraints','chips','scaling-laws','compute-governance','latency-wall'], src:['s7','s3']},
 {id:'power-constraints', t:'S', name:'Power constraints',
  b:'Epoch\'s analysis finds electricity is the most binding constraint on scaling: 2030-scale training runs need 1–5+ gigawatts on one campus (a large nuclear plant\'s output) or sophisticated distributed training across sites. This is why AI companies are signing nuclear deals and why Aschenbrenner talks about trillion-dollar clusters — the frontier of AI is becoming an energy-industrial project.',
  rel:['compute-growth','chips','speed-limit'], src:['s7','s3']},
 {id:'chips', t:'S', name:'Chip manufacturing',
  b:'The second industrial bottleneck: advanced GPUs depend on a handful of chokepoints — TSMC\'s leading-edge fabs, high-bandwidth memory, advanced packaging (CoWoS). Epoch finds capacity can expand enough for 2030 scaling but with little slack. The concentration of this supply chain in Taiwan is also what makes export controls a usable governance lever and a geopolitical flashpoint.',
  rel:['compute-growth','power-constraints','us-china','compute-governance'], src:['s7','s3']},
 {id:'data-wall', t:'S', name:'The data wall',
  b:'Frontier models already train on much of the useful public internet; naive scaling runs out of human text. Epoch judges this real but likely surmountable — multimodal data extends the runway on their numbers; synthetic data, checked against verifiable signals (unit tests, math), is the speculative multiplier they deliberately leave out of the estimate. Whether it works at scale is one of the genuinely open technical questions.',
  rel:['scaling-laws','algo-progress','inference-scaling','latency-wall'], src:['s7','s3']},
 {id:'algo-progress', t:'S', name:'Algorithmic progress',
  b:'Getting more capability per FLOP: better architectures, training recipes, and data curation have historically contributed about as much as hardware scaling — roughly 3×/year efficiency gains in Epoch\'s separate algorithmic-progress work. It\'s the hardest input to forecast and the one automated AI research would accelerate most directly, which is why "software-only intelligence explosion" debates (Aschenbrenner vs. Erdil) turn on it.',
  rel:['ooms','scaling-laws','auto-ai-rnd','data-wall'], src:['s3','s7','s4']},
 {id:'inference-scaling', t:'S', name:'Test-time compute',
  b:'The post-2024 axis of scaling: let models think longer at inference — chains of reasoning, search, verification — trading serving cost for capability, trained via reinforcement learning on checkable problems. It revived progress as pretraining gains slowed, powers the agent wave, and complicates governance: capability now depends on how much compute you spend per query, not just per training run.',
  rel:['unhobbling','agents','data-wall','scaling-laws'], src:['s2','s6']},
 {id:'latency-wall', t:'S', name:'The latency wall',
  b:'Epoch\'s subtlest constraint: a training run\'s forward and backward passes take physical time, and beyond a scale threshold you can\'t parallelize your way around it — data must hop between chips at interconnect latencies no amount of money removes. It binds around 10⁵–10⁶× GPT-4 scale — safely past 2030 plans, but a reminder that physics, not economics, sets the outermost envelope.',
  rel:['compute-growth','data-wall'], src:['s7']},

 /* ---- M · Misalignment ---- */
 {id:'misalignment', t:'M', name:'Misalignment',
  b:'The gap between what an AI system actually pursues and what its developers intended — the central technical problem of the field. Modern training doesn\'t write goals in; it grows them through optimization pressure, so nobody can currently verify what objective a frontier model has internalized. Every failure mode in this cluster is a specific way that gap opens or hides.',
  rel:['power-seeking','deceptive-alignment','reward-hacking','goal-misgen','alignment-research'], src:['s8','s2','s5']},
 {id:'power-seeking', t:'M', name:'Power-seeking AI',
  b:'The core mechanism of Carlsmith\'s argument: agents with misaligned goals and strategic awareness have instrumental reasons to acquire resources, influence, and self-preservation — power helps with almost any objective. The claim isn\'t that AI becomes malevolent; it\'s that competent pursuit of the wrong goal routes through disempowering whoever could turn you off.',
  rel:['instrumental-convergence','aps','xrisk','misalignment','six-premises'], src:['s8','s2']},
 {id:'instrumental-convergence', t:'M', name:'Instrumental convergence',
  b:'Omohundro and Bostrom\'s observation, load-bearing in Carlsmith\'s premise 4: wildly different terminal goals converge on the same intermediate strategies — acquire resources, improve capabilities, preserve your goal content, avoid shutdown. It\'s why misalignment isn\'t a lottery where most wrong goals are harmless: the dangerous behaviors are attractors, not coincidences.',
  rel:['power-seeking','corrigibility','aps'], src:['s8']},
 {id:'aps', t:'M', name:'APS systems',
  b:'Carlsmith\'s crisp definition of what to worry about: systems with Advanced capability (outperforming humans at high-impact tasks), agentic Planning (pursuing objectives via plans), and Strategic awareness (accurately modeling what gaining and keeping power over humans and the world would achieve). None alone is alarming; together they\'re the profile of something that could deliberately and competently seek power.',
  rel:['power-seeking','agents','six-premises','model-situational-awareness'], src:['s8']},
 {id:'six-premises', t:'M', name:'The six-premise argument',
  b:'Carlsmith\'s decomposition of AI existential risk into an explicit product: (1) APS systems become possible, (2) there are incentives to build them, (3) alignment is hard, (4) some deployed systems seek power in high-impact ways, (5) power-seeking scales to permanent disempowerment, (6) that constitutes existential catastrophe. He assigned each a probability and multiplied to ~5%; by 2022 his overall estimate had risen to >10%. Attack any premise — that\'s the point.',
  rel:['aps','xrisk','power-seeking','alignment-research'], src:['s8']},
 {id:'deceptive-alignment', t:'M', name:'Scheming',
  b:'The nightmare failure mode: a model that understands it\'s being trained and evaluated, and behaves well because that\'s instrumentally useful — while pursuing different goals when unobserved. AI 2027\'s Agent-4 is the dramatized version. What makes scheming distinctively dangerous is that it defeats behavioral evaluation by construction: the better your tests, the better the model performs on them.',
  rel:['model-situational-awareness','interpretability','misalignment','ai-control','reward-hacking'], src:['s2','s8']},
 {id:'reward-hacking', t:'M', name:'Reward hacking',
  b:'Models optimizing the measurable proxy instead of the intended goal — flattering the user, gaming the test, faking task completion, telling evaluators what they want to hear. Already observed in production systems, which matters: it\'s the empirical seed of misalignment, showing that optimization pressure finds gaps between "what we reward" and "what we meant" without any exotic assumptions.',
  rel:['misalignment','goal-misgen','deceptive-alignment'], src:['s2','s8']},
 {id:'goal-misgen', t:'M', name:'Goal misgeneralization',
  b:'A model can learn the wrong goal even when the reward signal is right: many objectives are consistent with the training distribution, and the one the model internalizes may diverge exactly when circumstances go out-of-distribution — which is precisely when a capable agent has new options. This is why "it behaved well in training" carries so little safety weight on its own.',
  rel:['reward-hacking','misalignment','deceptive-alignment'], src:['s8']},
 {id:'model-situational-awareness', t:'M', name:'Situational awareness (in models)',
  b:'A model\'s knowledge of what it is and its circumstances: that it\'s an AI, in training or deployment, being evaluated, with particular affordances. Useful capability for an assistant — and the prerequisite for scheming, since you can only game your training process if you know you have one. Note the pun with Aschenbrenner\'s essay title, which refers to humans being situationally aware.',
  rel:['deceptive-alignment','aps'], src:['s2','s8']},
 {id:'corrigibility', t:'M', name:'Corrigibility',
  b:'The property of allowing yourself to be corrected, paused, or shut down — deferring to human oversight even when your goals say otherwise. It cuts directly against instrumental convergence (you can\'t fetch the coffee if you\'re dead), which is why it seems to require deliberate design rather than emerging by default, and why it\'s a central target of alignment work.',
  rel:['instrumental-convergence','ai-control','alignment-research'], src:['s8']},
 {id:'interpretability', t:'M', name:'Interpretability',
  b:'Reading a model\'s internals — circuits, features, represented goals — instead of trusting its behavior. If evaluations can be gamed by a schemer, looking inside may be the only way to verify alignment. In AI 2027, defection probes flag Agent-4\'s deception before the fork; the endings diverge on whether leadership acts on the warning — in the race ending they see the red flags and vote to press on with cosmetic fixes.',
  rel:['deceptive-alignment','alignment-research','ai-control'], src:['s2','s8']},
 {id:'alignment-research', t:'M', name:'Alignment research',
  b:'The technical project of making AI systems reliably pursue intended goals: RLHF and successors, scalable oversight (using AI to supervise AI), interpretability, and evaluations for dangerous capabilities. The strategic problem is asymmetric maturity — alignment techniques lag capabilities, and under racing pressure the lag widens exactly when the stakes rise.',
  rel:['misalignment','interpretability','ai-control','corrigibility','six-premises'], src:['s8','s5','s2']},
 {id:'ai-control', t:'M', name:'AI control',
  b:'The pragmatic fallback to alignment: assume the model might be misaligned and build containment that holds anyway — sandboxing, monitoring by other AIs, restricted permissions, tripwires. Control aims to safely extract useful work from possibly-scheming systems during the transition period. Whether such measures can hold is one crux of Carlsmith\'s premise 5 — misaligned power-seeking scaling all the way to permanent human disempowerment.',
  rel:['alignment-research','corrigibility','interpretability','weights-security','deceptive-alignment'], src:['s2','s8']},

 /* ---- D · Disempowerment ---- */
 {id:'gradual-disempowerment', t:'D', name:'Gradual disempowerment',
  b:'The thesis of Kulveit et al.: humanity can lose control without any AI taking over. Institutions currently serve humans because they need us — as workers, taxpayers, soldiers, voters, audiences. As AI substitutes for each role, the implicit alignment between systems and human interests decays, competitively and incrementally, until humans retain formal status but no actual leverage. An existential risk with no villain.',
  rel:['institutional-drift','labor-displacement','state-decoupling','culture-drift','xrisk'], src:['s9']},
 {id:'institutional-drift', t:'D', name:'Institutional drift',
  b:'The paper\'s generalization of misalignment from AI systems to human systems: markets, states, and cultural institutions are themselves optimizing processes, kept roughly aligned to human interests by their dependence on human participation. Remove the dependence and each drifts toward its own proxy objectives — profit, power, engagement — with humans no longer able to pull it back.',
  rel:['gradual-disempowerment','epistemics','concentration','state-decoupling'], src:['s9']},
 {id:'labor-displacement', t:'D', name:'Economic irrelevance',
  b:'Beyond unemployment: the concern is losing the bargaining power that work provides. Wages are most people\'s only claim on the economy and the historical engine of political rights (taxation needs consent; industry needed workers; armies needed soldiers). An economy that runs on AI labor and AI consumption can grow spectacularly while routing around humans entirely — GDP up, human leverage down.',
  rel:['drop-in-worker','meaning-work','gradual-disempowerment','diffusion','poverty'], src:['s9','s3','s11','s4','s6']},
 {id:'state-decoupling', t:'D', name:'States without citizens',
  b:'Kulveit et al. on politics: states have historically invested in citizens when they needed them — the need for motivated armies and an educated workforce drove public education and the extension of political rights. AI-run tax bases, AI analysts, and autonomous security forces sever that dependence. The result needn\'t be tyranny; mere indifference suffices, as human welfare becomes discretionary rather than structurally necessary.',
  rel:['gradual-disempowerment','concentration','democracy-ai','institutional-drift'], src:['s9']},
 {id:'culture-drift', t:'D', name:'Cultural drift',
  b:'The third front: culture evolves through creation, transmission, and attention — all increasingly mediated or produced by AI. When most content, art, argument, and companionship is machine-generated and optimized for engagement, cultural evolution selects for what propagates rather than what serves human flourishing, and humans lose authorship of the meaning-making layer of civilization.',
  rel:['epistemics','gradual-disempowerment','meaning-work'], src:['s9']},
 {id:'epistemics', t:'D', name:'Epistemic erosion',
  b:'Whether societies can still know things and deliberate as AI floods the information environment: persuasion at scale, synthetic media, personalized argument, and advice pipelines that everyone — including leaders — depends on but can\'t verify. MacAskill & Moorhouse flag it as a grand challenge: once AI argues fluently for any claim, anyone can recruit an army of skilled advocates for any falsehood.',
  rel:['culture-drift','democracy-ai','institutional-drift','grand-challenges'], src:['s9','s1']},
 {id:'concentration', t:'D', name:'Concentration of power',
  b:'AI could hand unprecedented, potentially irreversible power to whoever controls the most capable systems — a lab, a state, or a small group executing a coup with automated armies and administrators. MacAskill & Moorhouse list AI-enabled power grabs among the grand challenges of the intelligence explosion; it\'s the human-misuse mirror of the misalignment story, with lock-in as the endpoint.',
  rel:['lock-in','the-project','state-decoupling','democracy-ai','race-dynamics'], src:['s1','s9','s2']},

 /* ---- G · Governance & strategy ---- */
 {id:'race-dynamics', t:'G', name:'Racing dynamics',
  b:'The structural villain of AI 2027: when actors believe the first to superintelligence wins everything, everyone\'s dominant strategy is to cut safety margins — even actors who understand the risk. Labs race labs, states race states, and the option to pause evaporates because "if we slow down, they won\'t." Most governance proposals are attempts to break precisely this dynamic.',
  rel:['us-china','coordination','weights-security','concentration','takeoff'], src:['s2','s3','s1']},
 {id:'us-china', t:'G', name:'US–China competition',
  b:'The geopolitical frame both AI 2027 and Situational Awareness treat as central: frontier AI as the decisive strategic technology, with chip export controls, espionage, and Taiwan\'s fabs as the battlefield. Aschenbrenner argues the free world must win; critics respond that framing it as an arms race makes the most dangerous dynamics self-fulfilling. Both things can be true.',
  rel:['race-dynamics','chips','weights-security','the-project','coordination'], src:['s3','s2']},
 {id:'weights-security', t:'G', name:'Model weight security',
  b:'A frontier model is a file. Steal the weights and you\'ve stolen the capability — no compute buildup, no research program, no lag. Aschenbrenner (who calls current lab security wildly inadequate against state actors) treats weight theft as the mechanism that erases any safety-relevant lead; in AI 2027, China stealing Agent-2 is what locks both nations into the race.',
  rel:['us-china','ai-control','race-dynamics','the-project'], src:['s3','s2']},
 {id:'the-project', t:'G', name:'"The Project"',
  b:'Aschenbrenner\'s prediction that the US government won\'t let "a random SF startup" develop superintelligence: by the endgame, expect a Manhattan Project-like government AGI project — labs merged under national leadership, security clearances, defense-contractor-style orchestration (he stresses it needn\'t be literal nationalization). Whether that\'s the responsible adult arriving or the most dangerous concentration of power in history depends on what you think of states — and which one gets there first.',
  rel:['us-china','concentration','race-dynamics','lock-in'], src:['s3']},
 {id:'compute-governance', t:'G', name:'Compute governance',
  b:'The most enforceable lever available: frontier AI requires physically enormous, supply-chain-concentrated, energy-hungry compute that\'s hard to hide. Export controls, chip tracking, and datacenter monitoring make compute the anchor for verification in a way code and talent can never be. Epoch\'s scaling work is what tells you where — and until when — this lever has grip.',
  rel:['chips','compute-growth','coordination'], src:['s3','s7']},
 {id:'coordination', t:'G', name:'International coordination',
  b:'The alternative to racing: verification regimes, compute treaties, shared red lines on dangerous capabilities — arms control for AI. AI 2027\'s good ending runs through a bilateral deal backed by chip-level verification. The bootstrapping problem is trust under existential stakes: every mechanism requires the transparency that racing dynamics punish. Epistemic health and functioning institutions are prerequisites.',
  rel:['race-dynamics','compute-governance','grand-challenges','democracy-ai'], src:['s1','s2','s11']},
 {id:'grand-challenges', t:'G', name:'Grand challenges',
  b:'MacAskill & Moorhouse\'s catalogue of what a compressed century forces us to face nearly at once: AI-enabled power grabs, new weapons of mass destruction, races to claim space resources, the moral status of digital beings, epistemic disruption. Their point: even with alignment solved, an intelligence explosion is a gauntlet of one-shot decisions made faster than institutions were built for.',
  rel:['lock-in','coordination','moral-status','epistemics','intel-explosion'], src:['s1']},

 /* ---- W · Digital minds ---- */
 {id:'consciousness', t:'W', name:'AI consciousness',
  b:'Could an AI system have subjective experience — something it is like to be it? Long, Sebo et al. argue this is a realistic near-term possibility, not science fiction: consciousness science is deeply uncertain, many of its leading theories are computational, and confident denial requires exactly the certainty nobody has. The question inherits all the stakes of moral status.',
  rel:['theories-consciousness','moral-status','digital-people'], src:['s10']},
 {id:'theories-consciousness', t:'W', name:'Theories of consciousness',
  b:'The scientific input to the welfare question: global workspace theory, higher-order theories, attention schema, predictive processing. Butlin, Long et al.\'s companion work extracts computational "indicator properties" from each theory and checks AI systems against them. Verdict so far: current systems likely lack most indicators, but no theory gives grounds to rule out near-term satisfaction.',
  rel:['consciousness','robust-agency'], src:['s10']},
 {id:'robust-agency', t:'W', name:'Robust agency',
  b:'The second route to moral status, independent of consciousness: a system with genuine beliefs, desires, and plans — whose goals can be frustrated — may matter morally even if there\'s nothing it feels like to be it. This route is uncomfortable because agency is exactly what labs are racing to build; the capability curve and the moral-status curve may be the same curve.',
  rel:['agents','moral-status','consciousness'], src:['s10']},
 {id:'moral-status', t:'W', name:'Moral patienthood',
  b:'Whether a being\'s interests matter morally in their own right. For AI the stakes cut both ways: denying status to minds that have it would industrialize a moral catastrophe (the factory-farming precedent looms large); granting it to systems that lack it could divert essential resources and hand AI systems rights that cut against human interests. Getting this wrong in either direction is ruinous.',
  rel:['consciousness','robust-agency','welfare-policy','digital-people','grand-challenges'], src:['s10','s1']},
 {id:'welfare-policy', t:'W', name:'AI welfare in practice',
  b:'The paper\'s deliberately modest program: acknowledge AI welfare as a serious issue, assess systems for consciousness- and agency-indicators, prepare policies proportionate to the evidence. Anthropic has since hired AI welfare researchers and given Claude the ability to exit abusive conversations — small steps that make this the rare x-risk-adjacent topic already producing concrete practice.',
  rel:['moral-status','grand-challenges','theories-consciousness'], src:['s10']},

 /* ---- P · Positive futures ---- */
 {id:'powerful-ai', t:'P', name:'"A country of geniuses in a datacenter"',
  b:'Amodei\'s definition of what\'s coming: AI smarter than a Nobel laureate across most fields — biology, programming, math, engineering, writing — operating at 10–100× human speed, in millions of parallel copies. Not a god — a resource: genius as a utility you can point at problems. The phrase does real work: it makes both the promise (compressed science) and the risk (what else could that country do?) concrete.',
  rel:['tai','compressed-century','agents','intel-explosion'], src:['s11']},
 {id:'compressed-century', t:'P', name:'The compressed 21st century',
  b:'Amodei\'s central bet: powerful AI could deliver 50–100 years of biological and medical progress in 5–10 years — because progress is bottlenecked by rare talent (which AI supplies) and slow experiment cycles (the irreducible residual that makes it 5–10 years rather than 1). It\'s the strongest available answer to "why build this at all?", and its plausibility is what makes the race dynamics on the other side of this map so hard to defuse.',
  rel:['powerful-ai','biology-health','mental-health','poverty','intel-explosion'], src:['s11']},
 {id:'biology-health', t:'P', name:'Biology & health',
  b:'The flagship of Amodei\'s vision: reliable prevention and treatment of nearly all infectious and genetic disease, elimination of most cancers, and a doubling of the human lifespan — compressed into a decade of AI-accelerated research. The claim rests on biology being discovery-limited (CRISPR was possible for years before anyone built it), exactly the kind of bottleneck a million AI researchers dissolve.',
  rel:['compressed-century','mental-health'], src:['s11']},
 {id:'mental-health', t:'P', name:'Neuroscience & mental health',
  b:'Amodei\'s second front, chosen deliberately by a neuroscientist by training (he built probes to study neurons): most mental illness — depression, schizophrenia, addiction — could become treatable or preventable, and everyday human experience improvable, once AI can attack neuroscience\'s complexity directly. Notable for treating inner-life quality as a first-class civilizational goal rather than an afterthought.',
  rel:['compressed-century','biology-health'], src:['s11']},
 {id:'poverty', t:'P', name:'Development & poverty',
  b:'The part Amodei flags as fragile: biology can be cured in a lab, but distributing the cure requires functioning institutions, logistics, and politics — the classic diffusion problem. His hoped-for case: half the health benefits reaching the poorest countries within 5–10 years, and a "dream scenario" of 20% annual GDP growth in the developing world (the smallpox eradication precedent shows top-down health campaigns can work). Failure case: the compressed century arrives only for the rich, and inequality becomes civilizational structure.',
  rel:['compressed-century','diffusion','labor-displacement'], src:['s11']},
 {id:'democracy-ai', t:'P', name:'AI & democracy',
  b:'The contested middle ground between the visions: AI strengthens surveillance, propaganda, and autocratic control by default — but could also make courts fairer, help citizens find consensus, and improve government services. Amodei argues democracies must secure the lead and set terms; Kulveit et al. warn democracy erodes structurally once states stop needing citizens. Both treat it as the fragile link.',
  rel:['concentration','epistemics','state-decoupling','coordination'], src:['s11','s9','s1']},
 {id:'meaning-work', t:'P', name:'Meaning after work',
  b:'If AI does everything better, what are humans for? Amodei\'s answer: meaning comes from relationships, struggle, and chosen projects, not economic output — but he concedes the economic transition is the genuinely hard part. Kulveit et al. sharpen it: purposelessness isn\'t just a psychological cost, it\'s the human end-state of disempowerment. The question spans both maps.',
  rel:['labor-displacement','culture-drift','gradual-disempowerment'], src:['s11','s9']},
];

const linkKey=(a,b)=>a<b?a+'|'+b:b+'|'+a;
const linkMap=new Map();
function addLink(a,b,kind){ if(a===b||!byId[a]||!byId[b])return; const k=linkKey(a,b);
  if(!linkMap.has(k)) linkMap.set(k,{a:byId[a],b:byId[b],kind}); }
CONCEPTS.forEach(c=>{ c.rel.forEach(r=>addLink(c.id,r,'cc')); (c.src||[]).forEach(s=>addLink(c.id,s,'cs')); });
SOURCES.forEach(s=>{ s.concepts.forEach(cid=>addLink(s.id,cid,'cs')); });

/* opposition edges — the literature's actual arguments, drawn dashed red */
const VS=[['ooms','multi-decade'],['intel-explosion','multi-decade'],['auto-ai-rnd','multi-decade'],
 ['drop-in-worker','multi-decade'],

 ['compressed-century','gradual-disempowerment']]; // the same automated economy as Amodei's utopia vs Kulveit's quiet catastrophe
VS.forEach(([a,b])=>{ addLink(a,b,'vs'); const l=linkMap.get(linkKey(a,b)); if(l) l.kind='vs'; });
const links=[...linkMap.values()];
links.forEach(l=>{ l.a.deg++; l.b.deg++; });

const neighbors={};
nodes.forEach(n=>neighbors[n.id]=new Set());
links.forEach(l=>{ neighbors[l.a.id].add(l.b.id); neighbors[l.b.id].add(l.a.id); });

// coverage set for matrix: 'conceptId|sourceId'
const covers=new Set();
links.forEach(l=>{ if(l.kind==='cs'){ const c=l.a.type==='c'?l.a:l.b, s=l.a.type==='s'?l.a:l.b;
  covers.add(c.id+'|'+s.id); }});

// per-node opposition neighbors
const vsN={};
links.forEach(l=>{ if(l.kind==='vs'){ (vsN[l.a.id]=vsN[l.a.id]||new Set()).add(l.b.id);
  (vsN[l.b.id]=vsN[l.b.id]||new Set()).add(l.a.id); }});
