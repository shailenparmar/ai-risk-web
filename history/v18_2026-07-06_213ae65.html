/* ============================================================
   LAYOUT — 2D force simulation, deterministic, frozen at load
   ============================================================ */
let seed=42; function rnd(){ seed=(seed*1103515245+12345)&0x7fffffff; return seed/0x7fffffff; }
nodes.forEach(n=>{
  let c;
  if(n.type==='s'){ const cs=n.concepts.map(id=>byId[id]).filter(Boolean);
    c=[0,0]; cs.forEach(x=>{ const t=THEMES[x.t].c; c[0]+=t[0];c[1]+=t[1]; });
    c=c.map(v=>v/Math.max(cs.length,1));
  } else c=THEMES[n.t].c;
  n.x=c[0]+(rnd()-0.5)*160; n.y=c[1]+(rnd()-0.5)*160;
  n.vx=0;n.vy=0;
});

function simStep(){
  const N=nodes.length;
  for(let i=0;i<N;i++){ const a=nodes[i];
    for(let j=i+1;j<N;j++){ const b=nodes[j];
      let dx=a.x-b.x, dy=a.y-b.y;
      let d2=dx*dx+dy*dy+0.01; if(d2>90000) continue;
      const f=3400/d2; const d=Math.sqrt(d2);
      dx/=d;dy/=d;
      a.vx+=dx*f; a.vy+=dy*f;
      b.vx-=dx*f; b.vy-=dy*f;
    }}
  links.forEach(l=>{
    const rest=l.kind==='cc'?85:120, k=0.02;
    let dx=l.b.x-l.a.x, dy=l.b.y-l.a.y;
    const d=Math.sqrt(dx*dx+dy*dy)+0.01;
    const f=k*(d-rest)/d;
    l.a.vx+=dx*f; l.a.vy+=dy*f;
    l.b.vx-=dx*f; l.b.vy-=dy*f;
  });
  nodes.forEach(n=>{
    if(n.type==='c'){ const c=THEMES[n.t].c;
      n.vx+=(c[0]-n.x)*0.010; n.vy+=(c[1]-n.y)*0.010; }
    n.vx-=n.x*0.0006; n.vy-=n.y*0.0006;
    n.vx*=0.80;n.vy*=0.80;
    n.x+=n.vx; n.y+=n.vy;
  });
}
for(let i=0;i<420;i++) simStep(); // frozen layout — same every visit

/* walk tracking — persists across visits */
let doneWalks=new Set();
try{ doneWalks=new Set(JSON.parse(localStorage.getItem('aira-walks')||'[]')); }catch(e){}
function saveWalks(){ try{ localStorage.setItem('aira-walks', JSON.stringify([...doneWalks])); }catch(e){} }

// per-theme cluster stats for territory rendering
const clusters={};
Object.keys(THEMES).forEach(k=>{
  const ns=nodes.filter(n=>n.type==='c'&&n.t===k);
  const mx=ns.reduce((s,n)=>s+n.x,0)/ns.length, my=ns.reduce((s,n)=>s+n.y,0)/ns.length;
  const r=Math.max(...ns.map(n=>Math.hypot(n.x-mx,n.y-my)));
  clusters[k]={x:mx,y:my,r:r+55,ns};
});

/* theme label position: a uniform gap beyond the cluster's outermost
   node measured along the label's own direction — balanced by construction */
function themeLabelPos(k){
  const cl=clusters[k];
  const d=Math.hypot(cl.x,cl.y);
  if(d<80) return null; // Foundations: watermark at centroid
  let ux=cl.x/d, uy=cl.y/d;
  if(THEMES[k].la!==undefined){ const a=THEMES[k].la*Math.PI/180; ux=Math.cos(a); uy=Math.sin(a); }
  const extent=Math.max(0,...cl.ns.map(n=>(n.x-cl.x)*ux+(n.y-cl.y)*uy));
  const pad=THEMES[k].lp!==undefined?THEMES[k].lp:70;
  return [cl.x+ux*(extent+pad), cl.y+uy*(extent+pad)];
}

/* ============================================================
   RENDERER — 2D canvas, pan/zoom, fixed geography
   ============================================================ */
const stage=document.getElementById('stage'), cv=document.getElementById('cv'), ctx=cv.getContext('2d');
const reduceMotion = matchMedia('(prefers-reduced-motion: reduce)').matches;
let W=0,H=0,DPR=1;
let cam={x:0,y:0,z:0.6};
let camT=null;
let dirty=true;
let hoverId=null, selectedId=null, hoverTheme=null, selTheme=null;
let view='map';
const themeOn={}; Object.keys(THEMES).forEach(k=>themeOn[k]=true);
const isMobile=()=>innerWidth<=860;
const PANEL_W=388; // panel width + margins (docked sidebar)
const PANEL_PEEK=40; // px of the bottom sheet left showing when collapsed (the drag handle)
let panelCollapsed=false; // mobile bottom-sheet state
const panelEl=()=>document.getElementById('panel');
// how many px the bottom sheet covers at the bottom of the screen (0 on desktop)
function botOccupied(){
  if(!isMobile()) return 0;
  if(panelCollapsed) return PANEL_PEEK;
  return Math.min(panelEl().offsetHeight, Math.round(H*0.62));
}

function resize(){ DPR=Math.min(devicePixelRatio||1,2); W=innerWidth; H=innerHeight;
  cv.width=W*DPR; cv.height=H*DPR; cv.style.width=W+'px'; cv.style.height=H+'px'; dirty=true; }
addEventListener('resize',resize); resize();

function centerX(){ return isMobile()? W/2 : PANEL_W+(W-PANEL_W-16)/2; }
// desktop: below the header. mobile: centered in the strip between header and the bottom sheet.
function centerY(){ return isMobile()? (58+(H-botOccupied()))/2 : (H+58)/2; }
function toScreen(x,y){ return [(x-cam.x)*cam.z+centerX(), (y-cam.y)*cam.z+centerY()]; }
function toWorld(sx,sy){ return [(sx-centerX())/cam.z+cam.x, (sy-centerY())/cam.z+cam.y]; }

function labelPoints(){
  return Object.keys(clusters).filter(k=>themeOn[k]).map(themeLabelPos).filter(Boolean);
}
function fit(){
  const vis=nodes.filter(nodeVisible);
  const xs=vis.map(n=>n.x), ys=vis.map(n=>n.y);
  labelPoints().forEach(([lx,ly])=>{ xs.push(lx-160,lx+160); ys.push(ly-45,ly+45); });
  const x0=Math.min(...xs)-40,x1=Math.max(...xs)+40,y0=Math.min(...ys)-30,y1=Math.max(...ys)+40;
  const availW=(isMobile()?W:W-PANEL_W-16)-70, availH=isMobile()? (H-botOccupied()-58-40) : (H-170);
  const z=Math.min(availW/(x1-x0+1),availH/(y1-y0+1),1.15);
  return {x:(x0+x1)/2, y:(y0+y1)/2+20, z};
}
function goTo(t,instant){ if(instant||reduceMotion){ cam={...t}; camT=null; } else camT={...t}; dirty=true; }
// how far out manual zoom is allowed: just a slight touch past the esc/reset framing, not into empty space
function minZoom(){ return fit().z*0.85; }

function nodeVisible(n){ if(n.type==='s') return n.concepts.some(cid=>byId[cid]&&themeOn[byId[cid].t]); return themeOn[n.t]; }
function hexA(hex,a){ const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`; }
function tintSolid(hex,a){ const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16),
  m=x=>Math.round(255*(1-a)+x*a); return `rgb(${m(r)},${m(g)},${m(b)})`; }
function nodeColor(n){ return n.type==='s' ? '#232833' : THEMES[n.t].color; }
function nodeR(n){ return (n.type==='s' ? 11 : 4.2+Math.min(n.deg,14)*0.42) * Math.pow(cam.z,0.55); }

function activeSet(){
  const f=hoverId||selectedId; if(!f) return null;
  const s=new Set([f]); neighbors[f].forEach(x=>s.add(x)); return s;
}

const MONO=getComputedStyle(document.documentElement).getPropertyValue('--f-mono');

function inTheme(n,k){ return n.type==='c' ? n.t===k : n.concepts.some(cid=>byId[cid]&&byId[cid].t===k); }
const themeLabelBoxes=[]; // screen-space hit boxes for the theme names, rebuilt each frame
function draw(){
  ctx.setTransform(DPR,0,0,DPR,0,0);
  ctx.clearRect(0,0,W,H);
  themeLabelBoxes.length=0;
  const act=activeSet();
  const spotTheme=hoverTheme||selTheme;
  // themes touched by the focused node stay bright while everything else dims
  const focusN=byId[hoverId||selectedId];
  const actThemes=new Set();
  if(focusN){ if(focusN.type==='c') actThemes.add(focusN.t);
    else focusN.concepts.forEach(cid=>{ if(byId[cid]) actThemes.add(byId[cid].t); }); }

  Object.entries(clusters).forEach(([k,cl])=>{
    if(!themeOn[k])return;
    const [sx,sy]=toScreen(cl.x,cl.y); const sr=cl.r*cam.z*1.25;
    const g=ctx.createRadialGradient(sx,sy,sr*0.15,sx,sy,sr);
    g.addColorStop(0,hexA(THEMES[k].color,0.055)); g.addColorStop(1,hexA(THEMES[k].color,0));
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(sx,sy,sr,0,7); ctx.fill();
    // theme name at the perimeter, along the ray from map center through the cluster
    const dist=Math.hypot(cl.x,cl.y);
    const nm=THEMES[k].name.toUpperCase();
    ctx.textAlign='center'; ctx.textBaseline='middle';
    if(dist<80){ // Foundations: watermark on its own cluster, behind the nodes
      const [lx,ly]=toScreen(cl.x,cl.y);
      const fs=Math.min(Math.max(15,20*cam.z),30);
      ctx.font=`700 ${fs}px ${MONO}`;
      ctx.fillStyle=hexA(THEMES[k].color, spotTheme?(k===spotTheme?0.55:0.08):(act?(actThemes.has(k)?0.55:0.12):0.16));
      ctx.fillText(nm,lx,ly);
      const w=ctx.measureText(nm).width;
      themeLabelBoxes.push({k,x0:lx-w/2-8,y0:ly-fs*0.8,x1:lx+w/2+8,y1:ly+fs*0.8});
    } else {
      const [wx,wy]=themeLabelPos(k);
      const [lx,ly]=toScreen(wx,wy);
      const fs=Math.min(Math.max(16,23*cam.z),34);
      ctx.font=`700 ${fs}px ${MONO}`;
      ctx.fillStyle=hexA(THEMES[k].color, spotTheme?(k===spotTheme?1:0.25):(act?(actThemes.has(k)?1:0.3):0.8));
      let w;
      if(nm.includes(' & ')){
        const [a,b]=nm.split(' & ');
        ctx.fillText(a+' &',lx,ly-fs*0.62);
        ctx.fillText(b,lx,ly+fs*0.62);
        w=Math.max(ctx.measureText(a+' &').width,ctx.measureText(b).width);
        themeLabelBoxes.push({k,x0:lx-w/2-8,y0:ly-fs*1.3,x1:lx+w/2+8,y1:ly+fs*1.3});
      } else {
        ctx.fillText(nm,lx,ly);
        w=ctx.measureText(nm).width;
        themeLabelBoxes.push({k,x0:lx-w/2-8,y0:ly-fs*0.8,x1:lx+w/2+8,y1:ly+fs*0.8});
      }
    }
  });

  nodes.forEach(n=>{ const [sx,sy]=toScreen(n.x,n.y); n.sx=sx; n.sy=sy; });
  links.forEach(l=>{
    if(!nodeVisible(l.a)||!nodeVisible(l.b)) return;
    const focus=hoverId||selectedId;
    const inAct = act && (l.a.id===focus||l.b.id===focus);
    const isVS=l.kind==='vs';
    let alpha=isVS?0.7:(l.kind==='cc'?0.15:0.08);
    if(act){ alpha = inAct?(isVS?1:0.55):alpha*(isVS?0.35:0.18); }
    else if(spotTheme){ alpha = (inTheme(l.a,spotTheme)&&inTheme(l.b,spotTheme)) ? Math.min(alpha*2.2,1) : alpha*0.15; }
    if(isVS){ ctx.strokeStyle=hexA('#C7364C',alpha); ctx.lineWidth=inAct?2.4:1.8; ctx.setLineDash([6,4]); }
    else if(inAct){ const c=l.a.type==='c'?THEMES[l.a.t].color:(l.b.type==='c'?THEMES[l.b.t].color:'#232833');
      ctx.strokeStyle=hexA(c,alpha); ctx.lineWidth=1.4; }
    else { ctx.strokeStyle=`rgba(100,112,135,${alpha})`; ctx.lineWidth=1; }
    ctx.beginPath(); ctx.moveTo(l.a.sx,l.a.sy); ctx.lineTo(l.b.sx,l.b.sy); ctx.stroke();
    if(isVS) ctx.setLineDash([]);
  });

  const labelJobs=[];
  nodes.forEach(n=>{
    if(!nodeVisible(n)) return;
    const r=nodeR(n);
    const isFocus=n.id===hoverId||n.id===selectedId;
    let alpha=1;
    if(act&&!act.has(n.id)) alpha=0.14;
    else if(spotTheme&&!inTheme(n,spotTheme)) alpha=0.15;
    const col=nodeColor(n);
    if(n.type==='s'){
      ctx.fillStyle=hexA('#FFFFFF',alpha);
      ctx.strokeStyle=hexA(col,alpha*0.95); ctx.lineWidth=1.7;
      ctx.beginPath(); ctx.arc(n.sx,n.sy,r,0,7); ctx.fill(); ctx.stroke();
      ctx.fillStyle=hexA(col,alpha);
      ctx.font=`700 ${Math.max(8.5,r*0.9)}px ${MONO}`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(n.n,n.sx,n.sy+0.5);
    } else {
      if(isFocus){ ctx.fillStyle=hexA(col,0.15);
        ctx.beginPath(); ctx.arc(n.sx,n.sy,r+8,0,7); ctx.fill(); }
      ctx.fillStyle=hexA(col,alpha);
      ctx.beginPath(); ctx.arc(n.sx,n.sy,r,0,7); ctx.fill();
    }
    if(isFocus){ ctx.strokeStyle='rgba(22,24,29,0.75)'; ctx.lineWidth=1.4;
      ctx.beginPath(); ctx.arc(n.sx,n.sy,r+3.5,0,7); ctx.stroke(); }
    labelJobs.push({n,r,alpha,col,isFocus,inAct:act?act.has(n.id):false});
  });

  labelJobs.sort((a,b)=>{
    const pa=(a.isFocus?4:0)+(a.inAct?2:0)+(a.n.type==='s'?1:0);
    const pb=(b.isFocus?4:0)+(b.inAct?2:0)+(b.n.type==='s'?1:0);
    if(pa!==pb) return pb-pa; return b.n.deg-a.n.deg;
  });
  const placed=[];
  labelJobs.forEach(j=>{
    const n=j.n;
    if(j.alpha<0.2 && !j.isFocus) return;
    const fs=n.type==='s'?11.5:11;
    ctx.font=`${n.type==='s'?'700':'600'} ${fs}px ${MONO}`;
    const txt=n.type==='s'?n.name.toUpperCase():n.name;
    const w=ctx.measureText(txt).width;
    const lx=n.sx+j.r+6, ly=n.sy;
    const box={x:lx-2,y:ly-fs*0.72,w:w+4,h:fs*1.45};
    if(!j.isFocus && placed.some(p=>!(box.x>p.x+p.w||p.x>box.x+box.w||box.y>p.y+p.h||p.y>box.y+box.h))) return;
    if(box.x>W||box.x+box.w<0||box.y>H||box.y+box.h<0) return;
    placed.push(box);
    ctx.textAlign='left'; ctx.textBaseline='middle';
    ctx.fillStyle='rgba(255,255,255,0.85)';
    ctx.fillRect(box.x,box.y,box.w,box.h);
    if(j.isFocus||j.inAct) ctx.fillStyle = n.type==='s' ? '#16181D' : hexA(j.col,1);
    else ctx.fillStyle = n.type==='s' ? hexA('#3A4150',0.9*j.alpha) : hexA(j.col,0.9*j.alpha);
    ctx.fillText(txt,lx,ly);
  });
}

/* ---------- interaction ---------- */
let dragging=false,px=0,py=0,moved=0,pinchD=0;
stage.addEventListener('pointerdown',e=>{
  if(e.button!==0&&e.pointerType==='mouse')return;
  dragging=true;moved=0;px=e.clientX;py=e.clientY;
  stage.classList.add('dragging'); stage.setPointerCapture(e.pointerId);
});
stage.addEventListener('pointermove',e=>{
  if(dragging){
    const dx=e.clientX-px,dy=e.clientY-py; moved+=Math.abs(dx)+Math.abs(dy);
    cam.x-=dx/cam.z; cam.y-=dy/cam.z; camT=null; px=e.clientX;py=e.clientY; dirty=true;
  } else {
    const id=pick(e.clientX,e.clientY);
    const tk=id?null:pickThemeLabel(e.clientX,e.clientY);
    if(id!==hoverId||tk!==hoverTheme){ hoverId=id; hoverTheme=tk;
      stage.style.cursor=(id||tk)?'pointer':'grab'; dirty=true; }
  }
});
function pickThemeLabel(mx,my){
  for(const b of themeLabelBoxes){ if(mx>=b.x0&&mx<=b.x1&&my>=b.y0&&my<=b.y1) return b.k; }
  return null;
}
stage.addEventListener('pointerleave',()=>{ if(hoverId||hoverTheme){ hoverId=null; hoverTheme=null; dirty=true; } stage.style.cursor='grab'; });
stage.addEventListener('pointerup',e=>{
  stage.classList.remove('dragging');
  if(dragging&&moved<6){
    const id=pick(e.clientX,e.clientY);
    if(id) select(id);
    else{
      const tk=pickThemeLabel(e.clientX,e.clientY);
      if(tk) selectTheme(tk); // theme labels open the theme page
      else if(selectedId||selTheme) deselect();
    }
  }
  dragging=false;
});
stage.addEventListener('dblclick',e=>{
  const id=pick(e.clientX,e.clientY);
  if(!id) resetView();
});
stage.addEventListener('wheel',e=>{
  e.preventDefault();
  const f=Math.exp(-e.deltaY*0.000805); // proportional to scroll amount — gentle on trackpads and wheels (sensitivity +15%)
  const z2=Math.max(minZoom(),Math.min(4,cam.z*f));
  const [wx,wy]=toWorld(e.clientX,e.clientY);
  cam.x=wx-(e.clientX-centerX())/z2;
  cam.y=wy-(e.clientY-centerY())/z2;
  cam.z=z2; camT=null; dirty=true;
},{passive:false});
stage.addEventListener('touchstart',e=>{ if(e.touches.length===2){
  pinchD=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY); }},{passive:true});
stage.addEventListener('touchmove',e=>{ if(e.touches.length===2){
  const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
  if(pinchD>0){ cam.z=Math.max(minZoom(),Math.min(4,cam.z*(d/pinchD))); dirty=true; }
  pinchD=d; dragging=false; e.preventDefault(); }},{passive:false});

function pick(mx,my){
  let best=null,bd=1e9;
  nodes.forEach(n=>{
    if(!nodeVisible(n))return;
    const r=Math.max(nodeR(n),7)+4;
    const d=(n.sx-mx)**2+(n.sy-my)**2;
    if(d<r*r&&d<bd){bd=d;best=n.id;}
  });
  return best;
}

function frame(){
  if(camT){
    cam.x+=(camT.x-cam.x)*0.16; cam.y+=(camT.y-cam.y)*0.16; cam.z+=(camT.z-cam.z)*0.16;
    if(Math.abs(camT.x-cam.x)<0.4&&Math.abs(camT.y-cam.y)<0.4&&Math.abs(camT.z-cam.z)<0.002) camT=null;
    dirty=true;
  }
  if(dirty&&view==='map'){ draw(); dirty=false; }
  requestAnimationFrame(frame);
}
goTo(fit(),true);
draw(); dirty=false;
requestAnimationFrame(frame);

/* ============================================================
   UI — single left panel (home ⇄ detail), walks, matrix
   ============================================================ */
const panel=document.getElementById('panelScroll');
const esc=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;');

/* option 2.5: strong tint — 20% wash, solid-ish border, deep-tinted text */
function shade(hex,f){ // darken toward black by factor f
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgb(${Math.round(r*f)},${Math.round(g*f)},${Math.round(b*f)})`;
}
function tintStyle(hex){
  return `background:${hexA(hex,0.18)};border-color:${hexA(hex,0.75)};color:${shade(hex,0.62)}`;
}
function chipHTML(id){
  const n=byId[id]; if(!n)return'';
  if(n.type==='s') return `<button class="chip src" data-go="${id}" style="background:rgba(35,40,51,.08);border-color:rgba(35,40,51,.6);color:#16181D">${n.n}. ${esc(n.name)}</button>`;
  return `<button class="chip" data-go="${id}" style="${tintStyle(THEMES[n.t].color)}">${esc(n.name)}</button>`;
}
function shortAuthors(s){
  return s.authors.split(',')[0].split(' &')[0]+(s.authors.includes(',')||s.authors.includes('&')?' et al.':'');
}

/* ---------- home ---------- */
function showHome(){
  selectedId=null; dirty=true; syncMatrixSel();
  panel.innerHTML=`
   <div class="intro">
    <div class="sect" style="border-top:0;margin-top:0;padding-top:2px">DESCRIPTION</div>
    <p>80,000 Hours recommends reading the following <a class="plink" href="https://80000hours.org/articles/11-essential-resources-ai-risk/" target="_blank" rel="noopener">11 resources</a> to get up to speed on the most influential ideas shaping the AGI risk debate. I built this site to visualize the overall themes and shared concepts.</p>
    <p>Click one of the titles below to walk through its key concepts, or one of the nodes in the web to learn about a particular idea.</p>
    <p style="font-size:11.5px;line-height:1.5;color:var(--muted)">Note: this is a personal project with no official association with 80,000 Hours.</p>
    <div class="sect">READINGS</div>
    <div id="homeReads">${SOURCES.map(s=>{
      const done=doneWalks.has(s.id);
      return `<button class="rd${done?' done':''}" data-go="${s.id}">
        <span class="num">${s.n}</span>
        <span class="rb"><b>${esc(s.name)}</b><span>${esc(shortAuthors(s))} · ${s.year}</span></span>
        <span class="mark">${done?'✓':'▸'}</span></button>`;}).join('')}</div>
    <div class="sect">THEMES</div>
    <div id="legend">
      ${Object.entries(THEMES).map(([k,t])=>{
        const count=CONCEPTS.filter(c=>c.t===k).length;
        const srcN=SOURCES.filter(s=>s.concepts.some(cid=>byId[cid]&&byId[cid].t===k)).length;
        return `<div class="lg${themeOn[k]?'':' off'}" data-t="${k}" style="${tintStyle(t.color)}">${t.name}<span class="n" style="color:inherit;opacity:.65">${count} concepts · ${srcN} sources</span></div>`;}).join('')}
    </div>
   </div>`;
}

/* ---------- detail ---------- */
function renderNode(id){
  const n=byId[id]; if(!n)return;
  if(n.type==='s'){
    const stops=WALKS[n.id]||[];
    const relC=n.concepts.filter(c=>byId[c]);
    const done=doneWalks.has(n.id);
    panel.innerHTML=`
      ${navRowHTML()}
      <h2 class="title"><a class="titleLink" href="${n.url}" target="_blank" rel="noopener">${esc(n.name)} <span class="tl">↗</span></a></h2>
      <div class="byline">${esc(n.authors)}${n.org?' · '+esc(n.org):''} · ${n.year}</div>
      <div class="ctaRow">
        <button class="walkBtn${done?' done':''}" data-walk="${n.id}">${done?`WALK ITS ${stops.length} KEY CONCEPTS <span class="glyph">✓</span>`:`WALK ITS ${stops.length} KEY CONCEPTS <span class="glyph">▸</span>`}</button>
        <a class="linkout" href="${n.url}" target="_blank" rel="noopener">READ ↗</a>
      </div>
      <p class="blurb">${esc(n.blurb)}</p>
      <div class="sect">Core claims</div>
      <ul class="claims">${n.claims.map(c=>`<li>${esc(c)}</li>`).join('')}</ul>
      <div class="sect">Concepts it anchors</div>
      <div class="chips">${relC.map(chipHTML).join('')}</div>
      ${navRowHTML(true)}`;
  } else {
    const th=THEMES[n.t];
    const srcs=(n.src||[]).filter(s=>byId[s]).sort((a,b)=>byId[a].n-byId[b].n);
    const tens=vsN[n.id]?[...vsN[n.id]]:[];
    const rels=[...neighbors[n.id]].filter(x=>byId[x].type==='c'&&!tens.includes(x));
    panel.innerHTML=`
      ${navRowHTML()}
      <button class="eyebrow" data-theme-go="${n.t}" style="${tintStyle(th.color)};cursor:pointer" title="Open theme">${th.name.toUpperCase()}</button>
      <h2 class="title">${esc(n.name)}</h2>
      <p class="blurb" style="margin-top:8px">${esc(n.b)}</p>
      ${n.crux?`<div class="crux"><div class="cx-head">THE CRUX</div><p>${esc(n.crux)}</p></div>`:''}
      <div class="sect">Where it's argued (${srcs.length} reading${srcs.length!==1?'s':''})</div>
      <div class="chips">${srcs.map(chipHTML).join('')}</div>
      ${tens.length?`<div class="sect" style="color:#E85D6A">In tension with</div>
      <div class="chips">${tens.map(chipHTML).join('')}</div>`:''}
      <div class="sect">Adjacent concepts</div>
      <div class="chips">${rels.map(chipHTML).join('')}</div>
      ${navRowHTML(true)}`;
  }
  panel.scrollTop=0;
}
/* history of visited pages (concepts, readings, themes) for the BACK button */
const navStack=[];
function curEntry(){ return selectedId?{n:selectedId}:(selTheme?{t:selTheme}:null); }
function pushNav(){ const c=curEntry(); if(!c) return;
  const top=navStack[navStack.length-1];
  if(top&&top.n===c.n&&top.t===c.t) return;
  navStack.push(c); if(navStack.length>60) navStack.shift(); }
function navBack(){
  const e=navStack.pop(); if(!e) return;
  if(e.n) select(e.n,false); else selectTheme(e.t,false);
}
function navRowHTML(bottom){
  return `<div class="backRow"${bottom?' style="margin-top:18px;padding-top:14px;border-top:1px solid var(--line)"':''}><button class="backBtn" data-back-home>◀ HOME</button>${navStack.length?'<button class="backBtn" data-back-prev>◀ BACK</button>':''}</div>`;
}
function selectTheme(k,push=true){
  if(push&&!walk&&k===selTheme&&!selectedId) return; // re-clicking the theme you're already on isn't a new nav
  if(walk) walk=null;
  if(push) pushNav();
  selectedId=null; selTheme=k; hoverTheme=null; dirty=true;
  renderTheme(k);
  if(isMobile()&&panelCollapsed){ panelCollapsed=false; panelEl().classList.remove('collapsed'); }
  const cl=clusters[k];
  const avail=Math.min((isMobile()?W:W-PANEL_W-16),H)-170;
  if(view==='map') goTo({x:cl.x,y:cl.y,z:Math.max(0.45,Math.min(1.1,avail/(2*(cl.r+90))))});
}
function renderTheme(k){
  const th=THEMES[k];
  const cs=CONCEPTS.filter(c=>c.t===k);
  const srcCount={};
  cs.forEach(c=>(c.src||[]).forEach(s=>srcCount[s]=(srcCount[s]||0)+1));
  const topSrcs=Object.entries(srcCount).sort((a,b)=>b[1]-a[1]).slice(0,4).map(([sid])=>sid);
  panel.innerHTML=`
    ${navRowHTML()}
    <h2 class="title">${esc(th.name)}</h2>
    <p class="blurb" style="margin-top:8px">${esc(th.desc)}</p>
    <div class="sect">Its ${cs.length} concepts</div>
    <div class="chips">${cs.map(c=>chipHTML(c.id)).join('')}</div>
    <div class="sect">Readings that anchor it</div>
    <div class="chips">${topSrcs.map(chipHTML).join('')}</div>
    <div class="sect">Other themes</div>
    <div class="chips">${Object.entries(THEMES).filter(([ok])=>ok!==k).map(([ok,ot])=>
      `<button class="chip" data-theme-go="${ok}" style="${tintStyle(ot.color)}">${esc(ot.name)}</button>`).join('')}</div>
    ${navRowHTML(true)}`;
  panel.scrollTop=0;
}
function select(id,push=true){
  if(push&&!walk&&id===selectedId) return; // re-clicking the concept you're already on isn't a new nav
  if(push) pushNav();
  selectedId=id; selTheme=null; dirty=true;
  renderNode(id);
  if(isMobile()&&panelCollapsed){ panelCollapsed=false; panelEl().classList.remove('collapsed'); }
  const n=byId[id];
  if(view==='map'){
    const z=Math.max(cam.z,0.85);
    goTo({x:n.x,y:n.y,z});
  } else syncMatrixSel(true);
}
function deselect(){ selectedId=null; selTheme=null; navStack.length=0; dirty=true; showHome(); if(view==='map') goTo(fit()); }
function goBack(){
  if(walk){ endWalk(); return; }
  const fromTheme=!!selTheme;
  deselect(); syncMatrixSel();
  if(fromTheme){ // land back on the themes section, not the top
    const lg=document.getElementById('legend');
    if(lg) panel.scrollTop=lg.offsetTop-60;
  }
}
/* full reset: everything visible, nothing selected, camera fit */
function resetView(){
  Object.keys(THEMES).forEach(k=>themeOn[k]=true);
  hoverId=null; selectedId=null; selTheme=null; hoverTheme=null;
  navStack.length=0;
  applyMatrixFilter(); syncMatrixSel();
  showHome(); // rebuilds the theme rows from themeOn
  if(view==='map') goTo(fit());
  dirty=true;
}
/* ---------- mobile bottom-sheet: collapse to reveal the map, expand to read ---------- */
function reframe(){ // re-fit the camera to the current focus for the current visible area
  if(view!=='map') return;
  if(selectedId&&byId[selectedId]){ const n=byId[selectedId]; goTo({x:n.x,y:n.y,z:Math.max(cam.z,0.85)}); }
  else if(selTheme&&clusters[selTheme]){ const cl=clusters[selTheme]; goTo({x:cl.x,y:cl.y,z:cam.z}); }
  else goTo(fit());
}
function setPanelCollapsed(v){
  if(!isMobile()) return;
  panelCollapsed=v;
  panelEl().classList.toggle('collapsed',v);
  reframe();
}
(function wirePanelHandle(){
  const h=document.getElementById('panelHandle'); if(!h) return;
  let drag=null;
  const collapsedT=()=>panelEl().offsetHeight-PANEL_PEEK;
  h.addEventListener('pointerdown',e=>{
    if(!isMobile()) return;
    drag={y:e.clientY,moved:0}; h.setPointerCapture(e.pointerId);
    panelEl().style.transition='none';
  });
  h.addEventListener('pointermove',e=>{
    if(!drag) return;
    drag.moved=e.clientY-drag.y;
    const ct=collapsedT();
    const t=Math.max(0,Math.min(ct,(panelCollapsed?ct:0)+drag.moved));
    panelEl().style.transform='translateY('+t+'px)';
  });
  const end=e=>{
    if(!drag) return;
    const moved=drag.moved; drag=null;
    panelEl().style.transition=''; panelEl().style.transform='';
    // very sensitive & biased toward the new action: a tiny nudge down hides, a tiny nudge up shows, a tap toggles
    if(Math.abs(moved)<=6) setPanelCollapsed(!panelCollapsed);
    else setPanelCollapsed(moved>0);
  };
  h.addEventListener('pointerup',end);
  h.addEventListener('pointercancel',end);
})();
function backLabel(){ return walk ? '◀ EXIT WALK' : '◀ HOME'; }

/* panel delegation: back, walk, read, walk-nav, theme filter, node chips */
panel.addEventListener('click',e=>{
  if(e.target.closest('[data-back-home]')){ if(walk) walk=null; goBack(); return; }
  if(e.target.closest('[data-back-prev]')){ navBack(); return; }
  if(e.target.closest('[data-back]')){ goBack(); return; }
  const wb=e.target.closest('[data-walk]'); if(wb){ startWalk(wb.dataset.walk); return; }
  const tn=e.target.closest('[data-tnav]'); if(tn){ walkNav(+tn.dataset.tnav); return; }
  const lg=e.target.closest('.lg[data-t]');
  if(lg){ selectTheme(lg.dataset.t); return; }
  const tgo=e.target.closest('[data-theme-go]');
  if(tgo){ selectTheme(tgo.dataset.themeGo); return; }
  const b=e.target.closest('[data-go]'); if(b) select(b.dataset.go);
});
/* hover in the panel previews on the map: readings/chips highlight their node, theme rows spotlight their cluster */
panel.addEventListener('mouseover',e=>{
  const g=e.target.closest('[data-go]');
  if(g&&byId[g.dataset.go]){ hoverId=g.dataset.go; dirty=true; return; }
  const lg=e.target.closest('.lg[data-t]');
  if(lg){ hoverTheme=lg.dataset.t; dirty=true; }
});
panel.addEventListener('mouseout',e=>{
  const g=e.target.closest('[data-go]');
  if(g&&hoverId===g.dataset.go){ hoverId=null; dirty=true; }
  const lg=e.target.closest('.lg[data-t]');
  if(lg&&hoverTheme===lg.dataset.t){ hoverTheme=null; dirty=true; }
});

/* ---------- walks ---------- */
let walk=null, walkIdx=0;
function startWalk(sid){
  const stops=WALKS[sid]; if(!stops)return;
  walk={src:byId[sid], stops}; walkIdx=0; setView('map');
  showWalkStop();
}
function showWalkStop(){
  const st=walk.stops[walkIdx];
  select(st.id,false); injectNote();
}
function injectNote(){
  const st=walk.stops[walkIdx];
  const s=walk.src;
  // the reading's header, exactly as it appears on its own page, stays above the walk box
  const head=document.createElement('div');
  head.innerHTML=`<h2 class="title"><a class="titleLink" href="${s.url}" target="_blank" rel="noopener">${esc(s.name)} <span class="tl">↗</span></a></h2>
    <div class="byline">${esc(s.authors)}${s.org?' · '+esc(s.org):''} · ${s.year}</div>`;
  const div=document.createElement('div'); div.className='trailNote';
  div.innerHTML=`<p>${esc(st.note)}</p>
    <div class="tn-nav">
    <button data-tnav="-1" class="${walkIdx>0?'':'tn-ghost'}">← PREV</button>
    <span class="tn-count">${walkIdx+1} / ${walk.stops.length}</span>
    <button data-tnav="1">${walkIdx<walk.stops.length-1?'NEXT →':'FINISH ✓'}</button></div>`;
  panel.prepend(div);
  panel.prepend(head);
  // top row: HOME and EXIT WALK side by side
  const bb=panel.querySelector('.backBtn'); if(bb) bb.remove();
  const row=document.createElement('div'); row.className='backRow';
  row.innerHTML=`<button class="backBtn" data-back-home>◀ HOME</button>
    <button class="backBtn" data-back>✕ EXIT WALK</button>`;
  panel.prepend(row);
  panel.scrollTop=0;
}
function walkNav(d){
  if(!walk)return;
  const ni=walkIdx+d;
  if(ni>=walk.stops.length){ doneWalks.add(walk.src.id); saveWalks(); endWalk(); return; }
  if(ni<0)return;
  walkIdx=ni; showWalkStop();
}
function endWalk(){
  const sid=walk?walk.src.id:null;
  walk=null;
  if(sid){ select(sid,false); } else deselect();
}

/* ---------- search ---------- */
const search=document.getElementById('search'), results=document.getElementById('searchResults');
let srIndex=-1;
function runSearch(){
  const q=search.value.trim().toLowerCase();
  if(!q){ results.classList.remove('open'); return; }
  const nodeHits=nodes.filter(n=>{
    const hay=(n.name+' '+(n.b||n.blurb||'')+' '+(n.authors||'')).toLowerCase();
    return hay.includes(q);
  }).map(n=>({kind:'node', id:n.id, name:n.name,
    col:n.type==='s'?'#232833':THEMES[n.t].color,
    tag:n.type==='s'?'READING '+n.n:THEMES[n.t].name.toUpperCase()}));
  const themeHits=Object.entries(THEMES).filter(([k,t])=>
    (t.name+' '+(t.desc||'')).toLowerCase().includes(q)
  ).map(([k,t])=>({kind:'theme', id:k, name:t.name, col:t.color, tag:'THEME'}));
  const hits=[...themeHits,...nodeHits].sort((a,b)=>{
    const an=a.name.toLowerCase().indexOf(q), bn=b.name.toLowerCase().indexOf(q);
    return (an<0?99:an)-(bn<0?99:bn);
  }).slice(0,9);
  srIndex=-1;
  results.innerHTML=hits.map(h=>
    `<button class="sr" data-kind="${h.kind}" data-go="${h.id}"><span class="dot" style="background:${h.col}"></span>${esc(h.name)}<small>${h.tag}</small></button>`
  ).join('')||'<div style="padding:10px 12px;font-size:12px;color:var(--faint)">no matches</div>';
  results.classList.add('open');
}
function goResult(el){ if(el.dataset.kind==='theme') selectTheme(el.dataset.go); else select(el.dataset.go); }
search.addEventListener('input',runSearch);
search.addEventListener('keydown',e=>{
  const items=[...results.querySelectorAll('.sr')];
  if(e.key==='ArrowDown'){ srIndex=Math.min(srIndex+1,items.length-1); e.preventDefault(); }
  else if(e.key==='ArrowUp'){ srIndex=Math.max(srIndex-1,0); e.preventDefault(); }
  else if(e.key==='Enter'){ const t=items[srIndex]||items[0]; if(t){ goResult(t); results.classList.remove('open'); search.blur(); } return; }
  else if(e.key==='Escape'){ results.classList.remove('open'); search.blur(); return; }
  items.forEach((el,i)=>el.classList.toggle('active',i===srIndex));
});
results.addEventListener('click',e=>{ const b=e.target.closest('[data-go]');
  if(b){ goResult(b); results.classList.remove('open'); search.value=''; }});
document.addEventListener('click',e=>{ if(!e.target.closest('#searchWrap')) results.classList.remove('open'); });
document.addEventListener('keydown',e=>{
  if(e.key==='/'&&document.activeElement!==search){ e.preventDefault(); search.focus(); }
  if(e.key==='Escape'&&document.activeElement!==search){
    if(walk) endWalk(); else { setView('map'); resetView(); } }
  if(walk&&document.activeElement!==search){
    if(e.key==='ArrowRight'){ e.preventDefault(); walkNav(1); }
    if(e.key==='ArrowLeft'){ e.preventDefault(); walkNav(-1); }
  }
});

/* ---------- matrix ---------- */
const mtable=document.getElementById('mtable'), matrixWrap=document.getElementById('matrixWrap');
const SHORT={s1:'MacAskill & Moorhouse',s2:'AI 2027',s3:'Situational Awareness',s4:'Erdil (Epoch)',
 s5:'Most Important Century',s6:'Cotra × Narayanan',s7:'Epoch: Scaling to 2030',s8:'Carlsmith',
 s9:'Gradual Disempowerment',s10:'Taking AI Welfare Seriously',s11:'Machines of Loving Grace'};
function buildMatrix(){
  let html='<thead><tr><th class="cname">CONCEPT ▾ / READING ▸</th>';
  SOURCES.forEach(s=>{
    html+=`<th data-go="${s.id}" title="${esc(s.name)} — ${esc(s.authors)} (${s.year})"><span class="mh"><b>${String(s.n).padStart(2,'0')}</b>${esc(SHORT[s.id])}</span></th>`;
  });
  html+='</tr></thead>';
  Object.entries(THEMES).forEach(([k,t])=>{
    html+=`<tbody data-t="${k}" style="--tint:${tintSolid(t.color,0.05)}"><tr class="throw"><td class="cname" data-theme-go="${k}" style="cursor:pointer"><span class="mth" style="${tintStyle(t.color)}">${t.name.toUpperCase()}</span></td><td colspan="${SOURCES.length}"></td></tr>`;
    CONCEPTS.filter(c=>c.t===k).forEach(c=>{
      html+=`<tr data-cid="${c.id}"><td class="cname" data-go="${c.id}" style="color:${shade(t.color,0.62)}">${esc(c.name)}</td>`;
      SOURCES.forEach(s=>{
        html+= covers.has(c.id+'|'+s.id)
          ? `<td><span class="cdot" data-go="${c.id}" style="background:${t.color}" title="${esc(c.name)} · in ${esc(s.name)}"></span></td>`
          : `<td><span class="cd-empty">·</span></td>`;
      });
      html+=`</tr>`;
    });
    html+='</tbody>';
  });
  mtable.innerHTML=html;
}
buildMatrix();
mtable.addEventListener('click',e=>{
  const tgo=e.target.closest('[data-theme-go]'); if(tgo){ selectTheme(tgo.dataset.themeGo); return; }
  const g=e.target.closest('[data-go]'); if(g) select(g.dataset.go);
});
function applyMatrixFilter(){
  mtable.querySelectorAll('tbody').forEach(tb=>{
    tb.style.display=themeOn[tb.dataset.t]?'':'none';
  });
}
function syncMatrixSel(scroll){
  mtable.querySelectorAll('tr.sel').forEach(r=>r.classList.remove('sel'));
  if(!selectedId) return;
  const row=mtable.querySelector(`tr[data-cid="${selectedId}"]`);
  if(row){ row.classList.add('sel'); if(scroll&&view==='matrix') row.scrollIntoView({block:'nearest'}); }
}

/* ---------- view tabs ---------- */
const tabMap=document.getElementById('tabMap'), tabMatrix=document.getElementById('tabMatrix');
function setView(v){
  view=v;
  tabMap.classList.toggle('on',v==='map');
  tabMatrix.classList.toggle('on',v==='matrix');
  matrixWrap.classList.toggle('show',v==='matrix');
  stage.style.display=v==='map'?'':'none';
  document.getElementById('resetHint').style.display=v==='map'?'':'none';
  if(v==='map') dirty=true; else syncMatrixSel(true);
}
tabMap.addEventListener('click',()=>setView('map'));
tabMatrix.addEventListener('click',()=>setView('matrix'));
document.getElementById('brandHome').addEventListener('click',()=>{
  if(walk) endWalk(); setView('map'); resetView();
});

showHome();

tintStyle=function(hex){return `background:${hexA(hex,0.26)};border-color:${hexA(hex,0.85)};color:${shade(hex,0.60)}`;};
buildMatrix();
document.querySelectorAll('#mtable tbody[data-t]').forEach(tb=>{ if(THEMES[tb.dataset.t]) tb.style.setProperty('--tc',THEMES[tb.dataset.t].color); });
{ const hc=document.querySelector('#mtable thead th.cname'); if(hc) hc.textContent=''; }
showHome();
