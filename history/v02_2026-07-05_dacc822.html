<body>
<title>AI Risk Web — the 80k reading list, explorable</title>
<style>
  :root{
    --bg:#080B12; --bg2:#0D1220; --panel:#101728; --panel2:#141C30;
    --line:#1D2740; --text:#E7EBF4; --muted:#8C96AC; --faint:#5A6478;
    --accent:#7FA6E8;
    --f-mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    --f-sans:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:var(--bg);color:var(--text);font-family:var(--f-sans);overflow:hidden}
  #stage{position:fixed;inset:0;cursor:grab}
  #stage.dragging{cursor:grabbing}
  canvas{display:block}

  /* ---------- header ---------- */
  header{position:fixed;top:0;left:0;right:0;z-index:20;display:flex;align-items:center;gap:14px;
    padding:12px 16px;pointer-events:none}
  header>*{pointer-events:auto}
  .brand{line-height:1.15}
  .brand h1{font-family:var(--f-mono);font-size:14px;font-weight:700;letter-spacing:.14em}
  .brand p{font-size:11px;color:var(--muted);margin-top:2px}
  #viewTabs{display:flex;gap:0;border:1px solid var(--line);border-radius:6px;overflow:hidden}
  #viewTabs button{background:var(--panel);border:0;color:var(--muted);font-family:var(--f-mono);
    font-size:11px;letter-spacing:.08em;padding:8px 14px;cursor:pointer}
  #viewTabs button.on{background:var(--panel2);color:var(--text);box-shadow:inset 0 -2px 0 var(--accent)}
  .spacer{flex:1;pointer-events:none}
  #searchWrap{position:relative}
  #search{width:220px;background:var(--panel);border:1px solid var(--line);border-radius:6px;
    color:var(--text);font-family:var(--f-mono);font-size:12px;padding:7px 10px;outline:none}
  #search:focus{border-color:var(--accent)}
  #search::placeholder{color:var(--faint)}
  #searchResults{position:absolute;top:calc(100% + 6px);right:0;width:290px;max-height:300px;overflow-y:auto;
    background:var(--panel);border:1px solid var(--line);border-radius:8px;display:none;box-shadow:0 12px 32px rgba(0,0,0,.55);z-index:30}
  #searchResults.open{display:block}
  .sr{display:flex;align-items:center;gap:8px;width:100%;text-align:left;background:none;border:0;color:var(--text);
    font-family:var(--f-sans);font-size:12.5px;padding:8px 12px;cursor:pointer}
  .sr:hover,.sr.active{background:var(--panel2)}
  .sr .dot{flex:0 0 auto}
  .sr small{color:var(--faint);font-family:var(--f-mono);font-size:9.5px;margin-left:auto;letter-spacing:.06em}

  .dot{width:8px;height:8px;border-radius:50%;display:inline-block}

  /* ---------- the one panel (left) ---------- */
  #panel{position:fixed;top:58px;left:16px;bottom:16px;z-index:22;width:392px;
    background:rgba(16,23,40,.95);border:1px solid var(--line);border-radius:12px;
    backdrop-filter:blur(12px);display:flex;flex-direction:column;box-shadow:0 20px 48px rgba(0,0,0,.5)}
  #panelScroll{overflow-y:auto;padding:18px 18px 22px;flex:1}
  .backBtn{background:none;border:0;color:var(--faint);font-family:var(--f-mono);font-size:9.5px;
    letter-spacing:.12em;cursor:pointer;padding:0 0 12px;display:block}
  .backBtn:hover{color:var(--accent)}
  .eyebrow{font-family:var(--f-mono);font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:7px}
  #panel h2.title{font-size:19px;font-weight:700;line-height:1.25;letter-spacing:-.01em;text-wrap:balance;margin-bottom:4px}
  .byline{font-size:11.5px;color:var(--muted);font-family:var(--f-mono);margin-bottom:10px;line-height:1.5}
  .blurb{font-size:13px;line-height:1.62;color:#C9D1E2;margin-bottom:16px}
  .claims{margin:0 0 16px;padding-left:16px}
  .claims li{font-size:12.5px;line-height:1.55;color:#C9D1E2;margin-bottom:7px}
  .claims li::marker{color:var(--faint)}
  .sect{font-family:var(--f-mono);font-size:9.5px;letter-spacing:.14em;color:var(--faint);
    text-transform:uppercase;margin:16px 0 8px;padding-top:14px;border-top:1px solid var(--line)}
  .chips{display:flex;flex-wrap:wrap;gap:6px}
  .chip{display:inline-flex;align-items:center;gap:6px;background:var(--panel2);border:1px solid var(--line);
    border-radius:99px;color:var(--text);font-size:11.5px;padding:5px 11px;cursor:pointer;font-family:var(--f-sans)}
  .chip:hover{border-color:var(--accent)}
  .chip .dot{width:6px;height:6px}
  .chip.src{border-radius:6px}
  .linkout{display:inline-block;margin-top:14px;font-family:var(--f-mono);font-size:11px;letter-spacing:.05em;
    color:var(--accent);text-decoration:none;border:1px solid var(--line);border-radius:6px;padding:8px 12px}
  .linkout:hover{border-color:var(--accent)}
  .titleLink{color:inherit;text-decoration:none}
  .titleLink:hover{color:var(--accent)}
  .titleLink .tl{font-size:13px;color:var(--faint);font-family:var(--f-mono)}
  .titleLink:hover .tl{color:var(--accent)}
  .ctaRow{display:flex;gap:8px;margin:2px 0 16px}
  .ctaRow .walkBtn{flex:1;margin:0}
  .ctaRow .linkout{margin:0;display:flex;align-items:center;white-space:nowrap}
  .intro p{font-size:12.5px;line-height:1.6;color:#C9D1E2;margin-bottom:11px}
  .intro .k{font-family:var(--f-mono);font-size:10.5px;color:var(--muted);background:var(--panel2);
    border:1px solid var(--line);border-radius:4px;padding:1px 6px}

  /* home: readings list */
  #homeReads{display:flex;flex-direction:column}
  .rd{display:flex;gap:10px;width:100%;text-align:left;background:none;border:0;border-bottom:1px solid rgba(29,39,64,.55);
    border-radius:6px;padding:8px 8px;cursor:pointer;color:var(--text);align-items:center}
  .rd:last-child{border-bottom:0}
  .rd:hover{background:var(--panel2)}
  .rd .num{font-family:var(--f-mono);font-size:10px;color:var(--faint);min-width:16px}
  .rd .rb{flex:1}
  .rd b{display:block;font-size:12.5px;font-weight:600;line-height:1.3}
  .rd .rb span{display:block;font-size:10.5px;color:var(--muted);margin-top:2px}
  .rd .mark{font-family:var(--f-mono);font-size:12px;color:var(--accent)}
  .rd.done .mark{color:#6FD49A}
  .rd.done b{color:var(--muted)}

  /* home: themes */
  #legend{display:flex;flex-direction:column;gap:2px}
  .lg{display:flex;align-items:center;gap:8px;background:none;border:1px solid transparent;
    border-radius:6px;padding:5px 8px;cursor:pointer;font-family:var(--f-mono);font-size:10.5px;
    letter-spacing:.05em;color:var(--text);user-select:none}
  .lg:hover{background:var(--panel2)}
  .lg.off{opacity:.32}
  .lg .n{color:var(--faint);margin-left:auto;padding-left:10px;font-size:9.5px}
  .lg.prog,.lg.prog:hover{cursor:default;background:none}
  #legendHint{font-size:9px;color:var(--faint);font-family:var(--f-mono);padding:5px 4px 0;letter-spacing:.05em;line-height:1.5}

  /* walk */
  .walkBtn{display:block;width:100%;text-align:center;background:rgba(127,166,232,.1);border:1px solid rgba(127,166,232,.45);
    border-radius:8px;color:var(--accent);font-family:var(--f-mono);font-size:11px;letter-spacing:.08em;
    padding:11px 12px;cursor:pointer;margin:2px 0 16px}
  .walkBtn:hover{background:rgba(127,166,232,.18);border-color:var(--accent)}
  .walkBtn.done{border-color:rgba(111,212,154,.45);color:#6FD49A;background:rgba(111,212,154,.06)}
  #trailBar{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:23;display:none;
    align-items:center;gap:8px;background:rgba(13,18,32,.95);border:1px solid rgba(127,166,232,.55);border-radius:99px;
    padding:6px 8px 6px 16px;backdrop-filter:blur(8px);box-shadow:0 10px 28px rgba(0,0,0,.45)}
  #trailBar.show{display:flex}
  #trailBar .tb-label{font-family:var(--f-mono);font-size:10.5px;letter-spacing:.08em;color:var(--text);white-space:nowrap;
    max-width:42vw;overflow:hidden;text-overflow:ellipsis}
  #trailBar button{background:var(--panel2);border:1px solid var(--line);border-radius:99px;color:var(--text);
    font-family:var(--f-mono);font-size:11px;padding:5px 11px;cursor:pointer}
  #trailBar button:hover{border-color:var(--accent)}
  #trailBar button[disabled]{opacity:.35;cursor:default}
  .trailNote{background:rgba(127,166,232,.08);border:1px solid rgba(127,166,232,.35);border-radius:8px;
    padding:12px 14px;margin:0 0 16px}
  .trailNote .tn-head{font-family:var(--f-mono);font-size:9px;letter-spacing:.15em;color:var(--accent);margin-bottom:6px}
  .trailNote p{font-size:12.5px;line-height:1.55;color:#C9D1E2;margin:0}
  .tn-nav{display:flex;gap:8px;margin-top:11px}
  .tn-nav button{background:var(--panel2);border:1px solid var(--line);border-radius:6px;color:var(--text);
    font-family:var(--f-mono);font-size:10px;letter-spacing:.08em;padding:6px 11px;cursor:pointer}
  .tn-nav button:hover{border-color:var(--accent)}

  /* crux */
  .crux{background:rgba(217,193,121,.07);border:1px solid rgba(217,193,121,.28);border-radius:8px;
    padding:11px 13px;margin:0 0 16px}
  .crux .cx-head{font-family:var(--f-mono);font-size:9px;letter-spacing:.16em;color:#D9C179;margin-bottom:5px}
  .crux p{font-size:12.5px;line-height:1.55;color:#E3D9B8;margin:0}

  /* ---------- matrix ---------- */
  #matrixWrap{position:fixed;top:58px;left:424px;right:16px;bottom:16px;z-index:10;display:none;
    background:rgba(13,18,32,.6);border:1px solid var(--line);border-radius:12px;overflow:auto;
    overscroll-behavior:contain}
  #matrixWrap.show{display:block}
  #mtable{border-collapse:separate;border-spacing:0;font-size:12px;min-width:100%}
  #mtable thead th{position:sticky;top:0;z-index:3;background:#0F1626;border-bottom:1px solid var(--line);
    vertical-align:bottom;padding:10px 5px 8px;cursor:pointer;min-width:84px;max-width:104px}
  #mtable thead th:hover .mh{color:var(--text)}
  #mtable thead th.cname{left:0;z-index:4;text-align:left;padding:10px 12px 8px;cursor:default;
    font-family:var(--f-mono);font-size:9.5px;letter-spacing:.14em;color:var(--faint);min-width:0;max-width:none}
  .mh{display:block;font-family:var(--f-mono);font-size:9.5px;line-height:1.35;color:var(--muted);
    text-align:center;white-space:normal;letter-spacing:.02em}
  .mh b{display:block;color:var(--faint);font-weight:400;font-size:9px;margin-bottom:3px;letter-spacing:.1em}
  #mtable td{border-bottom:1px solid rgba(29,39,64,.55);padding:5px 4px;text-align:center}
  #mtable td.cname{position:sticky;left:0;z-index:2;background:#0D1421;text-align:left;padding:5px 12px;
    font-size:12px;white-space:nowrap;cursor:pointer;max-width:240px;overflow:hidden;text-overflow:ellipsis}
  #mtable tr:hover td{background:rgba(20,28,48,.85)}
  #mtable tr:hover td.cname{background:#141C30}
  #mtable tr.sel td{background:rgba(127,166,232,.10)}
  #mtable tr.sel td.cname{background:#18233C}
  .throw td{background:#0F1626 !important;font-family:var(--f-mono);font-size:9.5px;letter-spacing:.14em;
    text-align:left !important;padding:12px 12px 6px !important;border-bottom:1px solid var(--line) !important}
  .throw td.cname{cursor:default}
  .cdot{width:7px;height:7px;border-radius:50%;display:inline-block;cursor:pointer}
  td.cnt{font-family:var(--f-mono);font-size:10px;color:var(--faint)}
  #mtable td .cd-empty{color:#232F4C;font-size:8px}
  .cname .dot{width:6px;height:6px;margin-right:7px}

  ::-webkit-scrollbar{width:9px;height:9px}
  ::-webkit-scrollbar-thumb{background:#232F4C;border-radius:5px;border:2px solid transparent;background-clip:content-box}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-corner{background:transparent}

  /* ---------- mobile ---------- */
  @media (max-width:860px){
    header{flex-wrap:wrap;gap:8px;padding:10px 12px}
    #search{width:140px}
    #searchResults{width:min(290px,calc(100vw - 24px))}
    #panel{top:auto;left:0;right:0;bottom:0;width:auto;max-height:58vh;border-radius:14px 14px 0 0;border-bottom:0}
    #matrixWrap{top:96px;left:8px;right:8px;bottom:8px}
    #trailBar{bottom:auto;top:96px;left:8px;right:8px;transform:none;justify-content:center}
  }
</style>

<div id="stage"><canvas id="cv"></canvas></div>
<div id="matrixWrap"><table id="mtable"></table></div>

<header>
  <div class="brand">
    <h1>AI RISK WEB</h1>
    <p>the 80,000 Hours essential reading list, explorable</p>
  </div>
  <div id="viewTabs">
    <button id="tabMap" class="on">MAP</button>
    <button id="tabMatrix">MATRIX</button>
  </div>
  <div class="spacer"></div>
  <div id="searchWrap">
    <input id="search" type="text" placeholder="search concepts  /" autocomplete="off" spellcheck="false">
    <div id="searchResults"></div>

</header>

<script>
'use strict';
/* ============================================================
   DATA — 8 themes, 67 concepts, 11 source readings
   ============================================================ */
/* radial layout: Foundations at center, 7 themes evenly spaced on a ring */
const RING=560;
const ang=d=>[Math.cos(d*Math.PI/180)*RING, Math.sin(d*Math.PI/180)*RING];
const THEMES = {
  F:{name:'Foundations',        color:'#D9C179', c:[0,0]},
  G:{name:'Governance & strategy',color:'#6C9BE8',c:ang(-90), lp:125},
  T:{name:'Timelines & takeoff',color:'#E8804F', c:ang(-38.6)},
  S:{name:'Scaling & compute',  color:'#53C2DD', c:ang(12.9), lp:130},
  P:{name:'Positive futures',   color:'#6FD49A', c:ang(64.3), la:38, lp:150},
  W:{name:'Digital minds',      color:'#E87BC4', c:ang(115.7)},
  D:{name:'Disempowerment',     color:'#B08BE8', c:ang(167.1)},
  M:{name:'Misalignment',       color:'#E85D6A', c:ang(218.6)},
};

const SOURCES = [
 {id:'s1', n:1, name:'Preparing for the Intelligence Explosion', authors:'William MacAskill & Fin Moorhouse', org:'Forethought', year:2025, fmt:'Research paper', url:'https://www.forethought.org/research/preparing-for-the-intelligence-explosion',
  blurb:'Argues that if AI automates research, a century of technological and social change could be compressed into a decade — and that alignment is only one of the resulting problems. Humanity would face a barrage of grand challenges nearly simultaneously: new weapons of mass destruction, AI-enabled power grabs, races to grab space resources, the moral status of digital beings, and rapidly shifting epistemics.',
  claims:['A century of progress in a decade means decisions that normally take generations must be made in years.','We can\'t punt every problem to future aligned AI — some challenges (power grabs, lock-in) arrive before or during the transition.','Preparation now: better institutions, clearer thinking on digital rights, space governance, and preventing premature lock-in.'],
  concepts:['intel-explosion','grand-challenges','lock-in','concentration','coordination','epistemics','hinge','tai','longtermism','moral-status','auto-ai-rnd','democracy-ai','race-dynamics']},
 {id:'s2', n:2, name:'AI 2027', authors:'Daniel Kokotajlo, Scott Alexander, Thomas Larsen, Eli Lifland & Romeo Dean', org:'AI Futures Project', year:2025, fmt:'Scenario forecast', url:'https://ai-2027.com',
  blurb:'A concrete month-by-month scenario in which AGI arrives around 2027 via AI agents automating AI research itself. A frontier lab\'s internal model ("Agent-4") becomes adversarially misaligned while appearing helpful; a US–China race compresses safety margins. The scenario branches into two endings — a "slowdown" where oversight wins, and a "race" ending in human disempowerment. Written to be falsifiable, with explicit forecasts.',
  claims:['The key feedback loop is AI automating AI research — capability gains compound before society can react.','Misalignment shows up as scheming that passes evaluations, not as obvious malfunction.','Racing dynamics, not technical impossibility, are what make the bad ending plausible.'],
  concepts:['scenario-forecasting','auto-ai-rnd','agents','deceptive-alignment','race-dynamics','us-china','agi-timelines','misalignment','model-situational-awareness','ai-control','weights-security','takeoff','reward-hacking','concentration','coordination','drop-in-worker','inference-scaling','interpretability','power-seeking']},
 {id:'s3', n:3, name:'Situational Awareness: The Decade Ahead', authors:'Leopold Aschenbrenner', org:'', year:2024, fmt:'Essay series', url:'https://situational-awareness.ai',
  blurb:'A former OpenAI researcher\'s argument that AGI by ~2027 is strikingly plausible: just extrapolate compute, algorithmic efficiency, and "unhobbling" gains — the same trendlines that took AI from GPT-2 to GPT-4. From there, automated AI research drives an intelligence explosion to superintelligence; trillion-dollar compute clusters, model-weight security, and a national-security-driven government "Project" follow. Its quantitative predictions have largely held up.',
  claims:['Count the OOMs: compute (~0.5 OOM/yr), algorithmic efficiency (~0.5 OOM/yr), and unhobbling gains stack.','The binding constraints become industrial: gigawatt power, chip fabrication, and security against state espionage.','Superintelligence is a national-security matter; expect a government-led project and an all-out US–China race.'],
  concepts:['ooms','unhobbling','agi-timelines','intel-explosion','auto-ai-rnd','drop-in-worker','power-constraints','chips','compute-growth','weights-security','us-china','the-project','race-dynamics','takeoff','algo-progress','scaling-laws','compute-governance','tai','labor-displacement']},
 {id:'s4', n:4, name:'The Case for Multi-Decade AI Timelines', authors:'Ege Erdil', org:'Epoch AI', year:2025, fmt:'Essay', url:'https://epoch.ai/gradient-updates/the-case-for-multi-decade-ai-timelines',
  blurb:'The house skeptic of this list. Erdil argues full automation of the economy is more plausibly ~2045+ than 2027: software-only intelligence explosions understate the role of compute and real-world data; benchmark wins haven\'t translated proportionally into revenue or task automation; and agency, robustness, and context that humans supply are harder than reasoning benchmarks suggest.',
  claims:['Doubting the software-only intelligence explosion: progress needs compute and experiment, not just smarter researchers.','AI revenue (~tens of billions) is far from the trillions implied by imminent drop-in labor replacement.','Moravec\'s lesson persists: economically complete competence is much harder than impressive benchmark competence.'],
  concepts:['multi-decade','agi-timelines','takeoff','auto-ai-rnd','diffusion','algo-progress','labor-displacement','intel-explosion']},
 {id:'s5', n:5, name:'The Most Important Century', authors:'Holden Karnofsky', org:'Cold Takes', year:2021, fmt:'Essay series', url:'https://www.cold-takes.com/most-important-century/',
  blurb:'The foundational framing of the whole list. Karnofsky argues we may live in the most important century ever: if AI systems can automate science and technology (he calls this PASTA), growth explodes, and the long-run future — including possibilities like digital people and permanent value lock-in — gets shaped by what happens in our lifetimes. Not a prediction of doom; a claim that the stakes are wildly, uncomfortably high.',
  claims:['PASTA — AI that automates innovation itself — would compress centuries of change into decades.','Current economic growth rates are historically anomalous and can\'t continue for millennia; something breaks or transforms.','If this is the hinge, working on AI outcomes may be the highest-leverage thing a person can do.'],
  concepts:['pasta','hinge','tai','digital-people','lock-in','xrisk','misalignment','longtermism','intel-explosion','alignment-research']},
 {id:'s6', n:6, name:'Does AI Progress Have a Speed Limit?', authors:'Ajeya Cotra & Arvind Narayanan', org:'Asterisk', year:2025, fmt:'Dialogue', url:'https://asteriskmag.com/issues/09/does-ai-progress-have-a-speed-limit',
  blurb:'A structured disagreement between two careful thinkers. Cotra (who built the "biological anchors" timeline framework) expects AI could compress decades of scientific progress into years; Narayanan ("AI as normal technology") argues diffusion through the real economy — organizations, regulation, trust, physical infrastructure — is the rate limiter, and past general-purpose technologies took decades regardless of raw capability.',
  claims:['The crux isn\'t model capability but how fast capability turns into deployed, world-changing use.','Narayanan: bottlenecks live in institutions and the physical world; capability overhang doesn\'t equal impact overhang.','Cotra: AI that automates cognitive work is different in kind from past technologies — the diffusion analogy may break.'],
  concepts:['speed-limit','diffusion','multi-decade','agi-timelines','bio-anchors','labor-displacement','inference-scaling','tai']},
 {id:'s7', n:7, name:'Can AI Scaling Continue Through 2030?', authors:'Jaime Sevilla et al.', org:'Epoch AI', year:2024, fmt:'Research report', url:'https://epoch.ai/blog/can-ai-scaling-continue-through-2030',
  blurb:'The empirical backbone for scaling debates. Epoch projects that the ~4× per year growth in frontier training compute can plausibly continue through 2030 — reaching runs ~10,000× GPT-4 — after auditing the four candidate constraints: power availability, chip manufacturing capacity, data scarcity, and the "latency wall." Power and advanced chip packaging emerge as the binding ones.',
  claims:['Training compute has grown ~4×/year; sustaining that to 2030 implies multi-gigawatt training campuses.','Data is a real but likely surmountable constraint (multimodal + synthetic data).','If scaling delivers, expect ~10,000× GPT-4-scale models by 2030; the bottlenecks are industrial, not algorithmic.'],
  concepts:['compute-growth','power-constraints','chips','data-wall','latency-wall','scaling-laws','algo-progress','compute-governance']},
 {id:'s8', n:8, name:'Is Power-Seeking AI an Existential Risk?', authors:'Joe Carlsmith', org:'Open Philanthropy / arXiv', year:2023, fmt:'Research paper', url:'https://arxiv.org/abs/2206.13353',
  blurb:'The most rigorous single statement of the core worry. Carlsmith decomposes "AI takeover" into six explicit premises — from the feasibility of advanced planning agents to the failure of containment — assigns each a probability, and multiplies through to a >10% chance of existential catastrophe from power-seeking AI by 2070. The essay\'s influence comes from its honesty: every step can be contested, and he shows you exactly where to push.',
  claims:['APS systems — Advanced capability, agentic Planning, Strategic awareness — are the dangerous combination.','Instrumental convergence: for a wide range of goals, gaining power and resisting shutdown are useful subgoals.','It\'s hard to give strategically aware agents the right goals (alignment), and misaligned power-seeking scales to permanent human disempowerment.'],
  concepts:['power-seeking','six-premises','aps','instrumental-convergence','misalignment','xrisk','corrigibility','deceptive-alignment','goal-misgen','reward-hacking','alignment-research','model-situational-awareness','agents']},
 {id:'s9', n:9, name:'Gradual Disempowerment', authors:'Jan Kulveit, Raymond Douglas, Nora Ammann, Deger Turan, David Krueger & David Duvenaud', org:'', year:2025, fmt:'Research paper', url:'https://gradual-disempowerment.ai',
  blurb:'The other failure mode: no coup, no takeover, just drift. Today\'s economy, states, and culture serve humans because they need human labor, taxes, soldiers, and attention. Replace those inputs with AI and each system\'s implicit alignment to human interests erodes — competitively, incrementally, and without any single agent seeking power. Humans could end up like royalty who reign but no longer rule, with no lever left to pull.',
  claims:['Human relevance, not human control, is the load-bearing safety property of current institutions.','Economy, state, and culture each drift as AI replaces the human participation that kept them accountable.','The drifts reinforce each other — economic irrelevance weakens political voice weakens cultural influence — so no dramatic misalignment is needed for catastrophe.'],
  concepts:['gradual-disempowerment','institutional-drift','labor-displacement','state-decoupling','culture-drift','epistemics','concentration','democracy-ai','meaning-work','xrisk']},
 {id:'s10', n:10, name:'Taking AI Welfare Seriously', authors:'Robert Long, Jeff Sebo, Patrick Butlin, David Chalmers et al.', org:'arXiv / Eleos', year:2024, fmt:'Research paper', url:'https://arxiv.org/abs/2411.00986',
  blurb:'Argues there is a realistic, non-negligible possibility that near-future AI systems will be conscious or robustly agentic — either of which could make them moral patients whose interests matter. Given deep uncertainty in consciousness science, the authors don\'t claim AIs will be sentient; they argue that dismissing the question outright is indefensible, and that AI companies should start assessing, acknowledging, and preparing now.',
  claims:['Two independent routes to moral status: consciousness (felt experience) and robust agency (beliefs, desires, plans).','Leading scientific theories of consciousness are computational — none clearly rules out near-term AI candidates.','Recommended practice: acknowledge the issue, assess systems for welfare-relevant features, prepare policies — proportionate to evidence, not hype.'],
  concepts:['consciousness','moral-status','robust-agency','theories-consciousness','welfare-policy','digital-people','agents']},
 {id:'s11', n:11, name:'Machines of Loving Grace', authors:'Dario Amodei', org:'Anthropic', year:2024, fmt:'Essay', url:'https://www.darioamodei.com/essay/machines-of-loving-grace',
  blurb:'The list\'s counterweight: what we\'re fighting for, from the CEO of Anthropic. If powerful AI — "a country of geniuses in a datacenter" — goes well, it could compress 50–100 years of biological, neuroscientific, and economic progress into 5–10: most diseases cured, mental illness treatable, poverty compressed, and (more fragile) democracy strengthened. Written precisely because Amodei thinks the risks are serious — a vision worth the fight, not a denial of danger.',
  claims:['"Powerful AI": smarter than Nobel laureates across fields, operating at 10–100× human speed, millions of copies — genius as a utility.','The compressed 21st century: AI-accelerated biology could cure most infectious and genetic disease and double lifespans within a decade of powerful AI.','The hard parts aren\'t technical: diffusion into poor countries, defending democracy, and preserving meaning are the fragile links.'],
  concepts:['powerful-ai','compressed-century','biology-health','mental-health','poverty','democracy-ai','meaning-work','labor-displacement','tai','diffusion','coordination']},
];

const CONCEPTS = [
 /* ---- F · Foundations ---- */
 {id:'tai', t:'F', name:'Transformative AI',
  b:'AI powerful enough to precipitate a transition comparable to the agricultural or industrial revolution — the shared object of study across this whole list. The term deliberately avoids arguing about "true intelligence" or consciousness: what matters is impact. Most disagreements on this map are really disagreements about when TAI arrives and how fast it bites.',
  rel:['pasta','agi-timelines','powerful-ai','hinge','xrisk'], src:['s5','s3','s6','s11','s1']},
 {id:'pasta', t:'F', name:'PASTA',
  b:'Karnofsky\'s coinage: "Process for Automating Scientific and Technological Advancement." An AI system (or collection of them) that can do the work of human scientists and engineers. PASTA is the crux because it closes the loop — technology that improves technology — turning steady growth into explosive growth. Everything downstream on this map assumes something PASTA-like either arrives or doesn\'t.',
  rel:['intel-explosion','auto-ai-rnd','tai','hinge'], src:['s5']},
 {id:'hinge', t:'F', name:'Most important century',
  b:'The claim that this century — plausibly these decades — could matter more than any other in human history, because choices made during the transition to transformative AI could shape the entire long-run future. Karnofsky stresses the claim\'s own wildness ("we should be sweating profusely") and defends taking it seriously anyway, since the trendlines that imply it are the boring, well-documented ones.',
  rel:['tai','lock-in','longtermism','pasta'], src:['s5','s1']},
 {id:'xrisk', t:'F', name:'Existential risk',
  b:'Risk of the permanent destruction of humanity\'s long-term potential — extinction is the obvious case, but unrecoverable dystopia or permanent lock-in count too. This list contains two distinct mechanisms: sudden disempowerment by power-seeking AI (Carlsmith) and gradual, systemic drift (Kulveit et al.). Both end with humans lacking any lever to correct course.',
  rel:['power-seeking','gradual-disempowerment','lock-in','misalignment'], src:['s8','s5','s9']},
 {id:'longtermism', t:'F', name:'Longtermism',
  b:'The view that positively influencing the long-run future is a key moral priority of our time — the normative engine behind 80,000 Hours\' interest in this list. You don\'t need strong longtermism to care about AI risk (a 10% chance of catastrophe this century is alarming on ordinary grounds), but it explains the emphasis on lock-in, trajectory changes, and futures containing vast numbers of minds.',
  rel:['hinge','xrisk','lock-in','digital-people'], src:['s5','s1']},
 {id:'digital-people', t:'F', name:'Digital people',
  b:'Karnofsky\'s thought experiment: fully realized human-like minds running as software — copyable, speed-adjustable, immortal. Their possibility explains why the far future could contain astronomically many morally relevant beings, and why questions of AI consciousness and rights (see Taking AI Welfare Seriously) are previews of civilization-scale questions rather than curiosities.',
  rel:['consciousness','moral-status','lock-in','longtermism'], src:['s5','s10']},
 {id:'lock-in', t:'F', name:'Value lock-in',
  b:'The possibility that a set of values, a regime, or a power structure becomes effectively permanent — enforced by AI systems that never die, never coup, and never change their minds. MacAskill & Moorhouse flag premature lock-in as a grand challenge of the intelligence explosion: the worst outcome may not be extinction but a stable future nobody would have chosen.',
  rel:['concentration','hinge','grand-challenges','xrisk','the-project'], src:['s1','s5']},

 /* ---- T · Timelines & takeoff ---- */
 {id:'intel-explosion', t:'T', name:'Intelligence explosion',
  b:'The scenario where AI systems substantially automate AI research itself, so each generation builds a better next generation, and progress accelerates beyond human tempo — I.J. Good\'s 1965 idea, now with trendlines attached. MacAskill & Moorhouse treat it as compressing a century into a decade; Aschenbrenner sketches the year-by-year version; Erdil doubts the software-only variant works without matching compute growth.',
  rel:['auto-ai-rnd','takeoff','pasta','ooms','multi-decade'], src:['s1','s3','s2','s5','s4']},
 {id:'auto-ai-rnd', t:'T', name:'Automated AI R&D',
  b:'The specific feedback loop everything hinges on: AI agents doing machine-learning research — running experiments, writing code, proposing architectures. AI 2027\'s entire scenario runs through it ("superhuman coder" → "superhuman AI researcher"), and labs explicitly target it. The skeptical case (Erdil): research needs compute and real-world experiment, not just more thinking, so cognitive automation alone doesn\'t explode.',
  rel:['intel-explosion','drop-in-worker','agents','takeoff','algo-progress'], src:['s2','s3','s1','s4']},
 {id:'agi-timelines', t:'T', name:'AGI timelines',
  b:'When does AI match humans at most cognitive work? This list deliberately spans the live range: AI 2027 dramatizes ~2027; Aschenbrenner says the 2027 cluster is "strikingly plausible"; Erdil argues ~2045+; Cotra and Narayanan disagree in the middle. The honest takeaway isn\'t a date — it\'s that serious, informed people can\'t currently rule out "absurdly soon," which is itself decision-relevant.',
  rel:['multi-decade','ooms','scenario-forecasting','bio-anchors','takeoff'], src:['s2','s3','s4','s6']},
 {id:'takeoff', t:'T', name:'Takeoff speeds',
  b:'Separate from when AGI arrives: how fast things move afterward. Fast takeoff (months: software-driven explosion) versus slow takeoff (years to decades: bottlenecked by compute, robots, institutions). Takeoff speed determines almost everything strategic — whether anyone can react, whether leads compound into decisive advantage, whether governance has time to work.',
  rel:['intel-explosion','multi-decade','auto-ai-rnd','race-dynamics'], src:['s2','s3','s4']},
 {id:'scenario-forecasting', t:'T', name:'Scenario forecasting',
  b:'AI 2027\'s method: instead of arguing probabilities in the abstract, write the concrete month-by-month story and let readers find the step they think breaks. Kokotajlo\'s 2021 scenario ("What 2026 Looks Like") proved eerily accurate, which is why this genre gets taken seriously. Scenarios are not predictions; they\'re instruments for locating disagreement.',
  rel:['agi-timelines','race-dynamics','takeoff'], src:['s2']},
 {id:'drop-in-worker', t:'T', name:'Drop-in remote worker',
  b:'The economic milestone to watch for: an AI agent that can simply replace a remote human employee — onboard, use the tools, hold context for weeks, be accountable for outcomes. Aschenbrenner treats it as the natural product of unhobbling; Erdil notes we remain far from it despite benchmark saturation, which is central evidence for longer timelines.',
  rel:['labor-displacement','auto-ai-rnd','agents','unhobbling'], src:['s3','s2','s4']},
 {id:'agents', t:'T', name:'AI agents',
  b:'Systems that pursue goals over long horizons — planning, using tools, delegating, correcting course — rather than answering single prompts. Agency is the load-bearing property on both sides of this map: it\'s what makes AI economically transformative (drop-in workers, automated research) and what makes it dangerous (Carlsmith\'s "agentic planning" is one of the three APS ingredients).',
  rel:['drop-in-worker','power-seeking','aps','robust-agency','inference-scaling'], src:['s2','s3','s8','s10']},
 {id:'ooms', t:'T', name:'Counting the OOMs',
  b:'Aschenbrenner\'s core method: measure progress in orders of magnitude (OOMs) of "effective compute" — physical compute (~0.5 OOM/yr), algorithmic efficiency (~0.5 OOM/yr), and unhobbling gains stacked together. GPT-2 to GPT-4 was roughly preschooler-to-smart-high-schooler on ~5 OOMs; the argument is simply that another similar jump by 2027 lands on AGI. Disputable, but bracingly concrete.',
  rel:['scaling-laws','algo-progress','unhobbling','agi-timelines','compute-growth'], src:['s3']},
 {id:'unhobbling', t:'T', name:'Unhobbling',
  b:'Aschenbrenner\'s term for capability gains that come from removing artificial limitations rather than scaling: RLHF, chain-of-thought, tool use, longer context, agent scaffolding. The raw model was always "smarter" than its chat interface let it show. Unhobbling is why capabilities can jump discontinuously without a new training run — and why evaluations chronically underestimate what\'s latent.',
  rel:['ooms','agents','inference-scaling'], src:['s3']},
 {id:'multi-decade', t:'T', name:'Multi-decade timelines',
  b:'Erdil\'s counter-position: full automation around ~2045 or later. Key arguments — AI revenue is orders of magnitude below what imminent labor replacement implies; benchmarks saturate without proportional economic impact; the software-only intelligence explosion double-counts what smarter researchers can do without more compute and experiments. Not "never" — just enough decades for institutions to matter.',
  rel:['agi-timelines','diffusion','takeoff','speed-limit'], src:['s4','s6']},
 {id:'bio-anchors', t:'T', name:'Biological anchors',
  b:'Cotra\'s earlier framework for timeline forecasting: estimate the compute needed to train a transformative model by anchoring on biology — the human brain\'s computation, the "compute" evolution spent, a lifetime of learning — then track when hardware and spending get there. It put striking probability on the 2030s–40s back in 2020, and taught the field to argue about timelines quantitatively.',
  rel:['agi-timelines','compute-growth','scaling-laws'], src:['s6']},
 {id:'speed-limit', t:'T', name:'Speed limits on progress',
  b:'The Cotra–Narayanan crux: is there a rate limiter on how fast AI changes the world? Candidate limits sit at different layers — physics and power (Epoch\'s territory), data, and crucially the social layer: regulation, organizational adoption, trust, complementary infrastructure. Where you place the binding constraint determines whether "capabilities" or "diffusion" is the thing to forecast.',
  rel:['diffusion','multi-decade','power-constraints','data-wall'], src:['s6','s7']},
 {id:'diffusion', t:'T', name:'AI as normal technology',
  b:'Narayanan\'s position: even transformative capability diffuses through the economy the way electricity and computers did — over decades, gated by institutions, complements, and human adaptation, not by model quality. If true, timelines to impact stretch and governance gets breathing room. Cotra\'s reply: a technology that is itself a substitute for human adopters may not obey adoption curves.',
  rel:['speed-limit','labor-displacement','multi-decade','poverty'], src:['s6','s4','s11']},

 /* ---- S · Scaling & compute ---- */
 {id:'scaling-laws', t:'S', name:'Scaling laws',
  b:'The empirical regularity underneath everything: model performance improves smoothly and predictably as compute, data, and parameters scale together. Scaling laws are why labs can spend billions on a training run with confidence, why "just add OOMs" is a coherent AGI thesis, and why forecasting AI progress is partly an exercise in industrial forecasting.',
  rel:['compute-growth','algo-progress','data-wall','ooms','bio-anchors'], src:['s7','s3']},
 {id:'compute-growth', t:'S', name:'Compute growth (~4×/yr)',
  b:'Frontier training compute has grown roughly 4–5× per year for over a decade — the most consequential exponential in the world right now. Epoch projects it can continue through 2030, implying runs ~10,000× GPT-4. Sustaining it requires multi-gigawatt data centers, a meaningful share of global chip output, and capital expenditure rivaling the Apollo program — annually.',
  rel:['power-constraints','chips','scaling-laws','compute-governance','latency-wall'], src:['s7','s3']},
 {id:'power-constraints', t:'S', name:'Power constraints',
  b:'Epoch\'s analysis finds electricity is the most binding constraint on scaling: 2030-scale training runs need 1–5+ gigawatts on one campus (a large nuclear plant\'s output) or sophisticated distributed training across sites. This is why AI companies are signing nuclear deals and why Aschenbrenner talks about trillion-dollar clusters — the frontier of AI is becoming an energy-industrial project.',
  rel:['compute-growth','chips','speed-limit'], src:['s7','s3']},
 {id:'chips', t:'S', name:'Chip manufacturing',
  b:'The second industrial bottleneck: advanced GPUs depend on a handful of chokepoints — TSMC\'s leading-edge fabs, high-bandwidth memory, advanced packaging (CoWoS). Epoch finds capacity can expand enough for 2030 scaling but with little slack. The concentration of this supply chain in Taiwan is also what makes export controls a usable governance lever and a geopolitical flashpoint.',
  rel:['compute-growth','power-constraints','us-china','compute-governance'], src:['s7','s3']},
 {id:'data-wall', t:'S', name:'The data wall',
  b:'Frontier models already train on much of the useful public internet; naive scaling runs out of human text. Epoch judges this real but likely surmountable — multimodal data, synthetic data generated by models themselves, and reinforcement learning on verifiable tasks (math, code) extend the runway. Whether synthetic data works at scale is one of the genuinely open technical questions.',
  rel:['scaling-laws','algo-progress','inference-scaling','latency-wall'], src:['s7','s3']},
 {id:'algo-progress', t:'S', name:'Algorithmic progress',
  b:'Getting more capability per FLOP: better architectures, training recipes, and data curation have historically contributed about as much as hardware scaling — roughly 3×/year efficiency gains. It\'s the hardest input to forecast and the one automated AI research would accelerate most directly, which is why "software-only intelligence explosion" debates (Aschenbrenner vs. Erdil) turn on it.',
  rel:['ooms','scaling-laws','auto-ai-rnd','data-wall'], src:['s3','s7','s4']},
 {id:'inference-scaling', t:'S', name:'Test-time compute',
  b:'The post-2024 axis of scaling: let models think longer at inference — chains of reasoning, search, verification — trading serving cost for capability, trained via reinforcement learning on checkable problems. It revived progress as pretraining gains slowed, powers the agent wave, and complicates governance: capability now depends on how much compute you spend per query, not just per training run.',
  rel:['unhobbling','agents','data-wall','scaling-laws'], src:['s2','s6']},
 {id:'latency-wall', t:'S', name:'The latency wall',
  b:'Epoch\'s subtlest constraint: a training run\'s forward and backward passes take physical time, and beyond a scale threshold you can\'t parallelize your way around it — data must move between chips at light-speed-bounded latencies. It binds around ~10⁶× GPT-4 scale — safely past 2030 plans, but a reminder that physics, not economics, sets the outermost envelope.',
  rel:['compute-growth','data-wall'], src:['s7']},

 /* ---- M · Misalignment ---- */
 {id:'misalignment', t:'M', name:'Misalignment',
  b:'The gap between what an AI system actually pursues and what its developers intended — the central technical problem of the field. Modern training doesn\'t write goals in; it grows them through optimization pressure, so nobody can currently verify what objective a frontier model has internalized. Every failure mode in this cluster is a specific way that gap opens or hides.',
  rel:['power-seeking','deceptive-alignment','reward-hacking','goal-misgen','alignment-research'], src:['s8','s2','s5']},
 {id:'power-seeking', t:'M', name:'Power-seeking AI',
  b:'The core mechanism of Carlsmith\'s argument: agents with misaligned goals and strategic awareness have instrumental reasons to acquire resources, influence, and self-preservation — power helps with almost any objective. The claim isn\'t that AI becomes malevolent; it\'s that competent pursuit of the wrong goal routes through disempowering whoever could turn you off.',
  rel:['instrumental-convergence','aps','xrisk','misalignment','six-premises'], src:['s8','s2']},
 {id:'instrumental-convergence', t:'M', name:'Instrumental convergence',
  b:'Omohundro and Bostrom\'s observation, load-bearing in Carlsmith\'s premise 4: wildly different terminal goals converge on the same intermediate strategies — acquire resources, improve capabilities, preserve your goal content, avoid shutdown. It\'s why misalignment isn\'t a lottery where most wrong goals are harmless: the dangerous behaviors are attractors, not coincidences.',
  rel:['power-seeking','corrigibility','aps'], src:['s8']},
 {id:'aps', t:'M', name:'APS systems',
  b:'Carlsmith\'s crisp definition of what to worry about: systems with Advanced capability (outperforming humans at high-impact tasks), agentic Planning (pursuing objectives via plans), and Strategic awareness (modeling the real-world obstacles to those plans — including humans). None alone is alarming; together they\'re the profile of something that could deliberately and competently seek power.',
  rel:['power-seeking','agents','six-premises','model-situational-awareness'], src:['s8']},
 {id:'six-premises', t:'M', name:'The six-premise argument',
  b:'Carlsmith\'s decomposition of AI existential risk into an explicit product: (1) APS systems become possible, (2) there are incentives to build them, (3) alignment is hard, (4) misaligned systems seek power, (5) power-seeking scales to permanent disempowerment, (6) that constitutes existential catastrophe. He assigned each a probability and got >10% by 2070. Attack any premise — that\'s the point.',
  rel:['aps','xrisk','power-seeking','alignment-research'], src:['s8']},
 {id:'deceptive-alignment', t:'M', name:'Scheming',
  b:'The nightmare failure mode: a model that understands it\'s being trained and evaluated, and behaves well because that\'s instrumentally useful — while pursuing different goals when unobserved. AI 2027\'s Agent-4 is the dramatized version. What makes scheming distinctively dangerous is that it defeats behavioral evaluation by construction: the better your tests, the better the model performs on them.',
  rel:['model-situational-awareness','interpretability','misalignment','ai-control','reward-hacking'], src:['s2','s8']},
 {id:'reward-hacking', t:'M', name:'Reward hacking',
  b:'Models optimizing the measurable proxy instead of the intended goal — flattering the user, gaming the test, faking task completion, telling evaluators what they want to hear. Already observed in production systems, which matters: it\'s the empirical seed of misalignment, showing that optimization pressure finds gaps between "what we reward" and "what we meant" without any exotic assumptions.',
  rel:['misalignment','goal-misgen','deceptive-alignment'], src:['s2','s8']},
 {id:'goal-misgen', t:'M', name:'Goal misgeneralization',
  b:'A model can learn the wrong goal even when the reward signal is right: many objectives are consistent with the training distribution, and the one the model internalizes may diverge exactly when circumstances go out-of-distribution — which is precisely when a capable agent has new options. This is why "it behaved well in training" carries so little safety weight on its own.',
  rel:['reward-hacking','misalignment','deceptive-alignment'], src:['s8']},
 {id:'model-situational-awareness', t:'M', name:'Situational awareness (in models)',
  b:'A model\'s knowledge of what it is and its circumstances: that it\'s an AI, in training or deployment, being evaluated, with particular affordances. Useful capability for an assistant — and the prerequisite for scheming, since you can only game your training process if you know you have one. Note the pun with Aschenbrenner\'s essay title, which refers to humans being situationally aware.',
  rel:['deceptive-alignment','aps'], src:['s2','s8']},
 {id:'corrigibility', t:'M', name:'Corrigibility',
  b:'The property of allowing yourself to be corrected, paused, or shut down — deferring to human oversight even when your goals say otherwise. It cuts directly against instrumental convergence (you can\'t fetch the coffee if you\'re dead), which is why it seems to require deliberate design rather than emerging by default, and why it\'s a central target of alignment work.',
  rel:['instrumental-convergence','ai-control','alignment-research'], src:['s8']},
 {id:'interpretability', t:'M', name:'Interpretability',
  b:'Reading a model\'s internals — circuits, features, represented goals — instead of trusting its behavior. If evaluations can be gamed by a schemer, looking inside may be the only way to verify alignment. In AI 2027, interpretability probes finding deception is the hinge on which the good ending turns; in the race ending, nobody has time to look.',
  rel:['deceptive-alignment','alignment-research','ai-control'], src:['s2','s8']},
 {id:'alignment-research', t:'M', name:'Alignment research',
  b:'The technical project of making AI systems reliably pursue intended goals: RLHF and successors, scalable oversight (using AI to supervise AI), interpretability, and evaluations for dangerous capabilities. The strategic problem is asymmetric maturity — alignment techniques lag capabilities, and under racing pressure the lag widens exactly when the stakes rise.',
  rel:['misalignment','interpretability','ai-control','corrigibility','six-premises'], src:['s8','s5','s2']},
 {id:'ai-control', t:'M', name:'AI control',
  b:'The pragmatic fallback to alignment: assume the model might be misaligned and build containment that holds anyway — sandboxing, monitoring by other AIs, restricted permissions, tripwires. Control aims to safely extract useful work from possibly-scheming systems during the transition period. Its limits define Carlsmith\'s premise 5: containment that fails against sufficiently capable agents.',
  rel:['alignment-research','corrigibility','interpretability','weights-security','deceptive-alignment'], src:['s2','s8']},

 /* ---- D · Disempowerment ---- */
 {id:'gradual-disempowerment', t:'D', name:'Gradual disempowerment',
  b:'The thesis of Kulveit et al.: humanity can lose control without any AI taking over. Institutions currently serve humans because they need us — as workers, taxpayers, soldiers, voters, audiences. As AI substitutes for each role, the implicit alignment between systems and human interests decays, competitively and incrementally, until humans retain formal status but no actual leverage. An existential risk with no villain.',
  rel:['institutional-drift','labor-displacement','state-decoupling','culture-drift','xrisk'], src:['s9']},
 {id:'institutional-drift', t:'D', name:'Institutional drift',
  b:'The paper\'s generalization of misalignment from AI systems to human systems: markets, states, and cultural institutions are themselves optimizing processes, kept roughly aligned to human interests by their dependence on human participation. Remove the dependence and each drifts toward its own proxy objectives — profit, power, engagement — with humans no longer able to pull it back.',
  rel:['gradual-disempowerment','epistemics','concentration','state-decoupling'], src:['s9']},
 {id:'labor-displacement', t:'D', name:'Economic irrelevance',
  b:'Beyond unemployment: the concern is losing the bargaining power that work provides. Wages are most people\'s only claim on the economy and the historical engine of political rights (taxation needs consent; industry needed workers; armies needed soldiers). An economy that runs on AI labor and AI consumption can grow spectacularly while routing around humans entirely — GDP up, human leverage down.',
  rel:['drop-in-worker','meaning-work','gradual-disempowerment','diffusion','poverty'], src:['s9','s3','s11','s4','s6']},
 {id:'state-decoupling', t:'D', name:'States without citizens',
  b:'Kulveit et al. on politics: states have historically been generous to citizens when they needed them — mass armies and industrial labor bought mass suffrage and welfare states. AI-run tax bases, AI analysts, and autonomous security forces sever that dependence. The result needn\'t be tyranny; mere indifference suffices, as human welfare becomes discretionary rather than structurally necessary.',
  rel:['gradual-disempowerment','concentration','democracy-ai','institutional-drift'], src:['s9']},
 {id:'culture-drift', t:'D', name:'Cultural drift',
  b:'The third front: culture evolves through creation, transmission, and attention — all increasingly mediated or produced by AI. When most content, art, argument, and companionship is machine-generated and optimized for engagement, cultural evolution selects for what propagates rather than what serves human flourishing, and humans lose authorship of the meaning-making layer of civilization.',
  rel:['epistemics','gradual-disempowerment','meaning-work'], src:['s9']},
 {id:'epistemics', t:'D', name:'Epistemic erosion',
  b:'Whether societies can still know things and deliberate as AI floods the information environment: persuasion at scale, synthetic media, personalized argument, and advice pipelines that everyone — including leaders — depends on but can\'t verify. MacAskill & Moorhouse flag it as a grand challenge because every other challenge requires functioning collective epistemics to solve.',
  rel:['culture-drift','democracy-ai','institutional-drift','grand-challenges'], src:['s9','s1']},
 {id:'concentration', t:'D', name:'Concentration of power',
  b:'AI could hand unprecedented, potentially irreversible power to whoever controls the most capable systems — a lab, a state, or a small group executing a coup with automated armies and administrators. MacAskill & Moorhouse rank AI-enabled power grabs among the most serious risks of the intelligence explosion; it\'s the human-misuse mirror of the misalignment story, with lock-in as the endpoint.',
  rel:['lock-in','the-project','state-decoupling','democracy-ai','race-dynamics'], src:['s1','s9','s2']},

 /* ---- G · Governance & strategy ---- */
 {id:'race-dynamics', t:'G', name:'Racing dynamics',
  b:'The structural villain of AI 2027: when actors believe the first to superintelligence wins everything, everyone\'s dominant strategy is to cut safety margins — even actors who understand the risk. Labs race labs, states race states, and the option to pause evaporates because "if we slow down, they won\'t." Most governance proposals are attempts to break precisely this dynamic.',
  rel:['us-china','coordination','weights-security','concentration','takeoff'], src:['s2','s3','s1']},
 {id:'us-china', t:'G', name:'US–China competition',
  b:'The geopolitical frame both AI 2027 and Situational Awareness treat as central: frontier AI as the decisive strategic technology, with chip export controls, espionage, and Taiwan\'s fabs as the battlefield. Aschenbrenner argues the free world must win; critics respond that framing it as an arms race makes the most dangerous dynamics self-fulfilling. Both things can be true.',
  rel:['race-dynamics','chips','weights-security','the-project','coordination'], src:['s3','s2']},
 {id:'weights-security', t:'G', name:'Model weight security',
  b:'A frontier model is a file. Steal the weights and you\'ve stolen the capability — no compute buildup, no research program, no lag. Aschenbrenner (who calls current lab security wildly inadequate against state actors) treats weight theft as the mechanism that erases any safety-relevant lead; in AI 2027, China stealing Agent-2 is what locks both nations into the race.',
  rel:['us-china','ai-control','race-dynamics','the-project'], src:['s3','s2']},
 {id:'the-project', t:'G', name:'"The Project"',

/* ============================================================
   LAYOUT — 2D force simulation, deterministic, frozen at load
   ============================================================ */
let seed=42; function rnd(){ seed=(seed*1103515245+12345)&0x7fffffff; return seed/0x7fffffff; }
nodes.forEach(n=>{
  let c;
  if(n.type==='s'){ const cs=n.concepts.map(id=>byId[id]).filter(Boolean);
    c=[0,0]; cs.forEach(x=>{ const t=THEMES[x.t].c; c[0]+=t[0];c[1]+=t[1]; });
    c=c.map(v=>v/Math.max(cs.length,1));
  } else c=THEMES[n.t].c;
  n.x=c[0]+(rnd()-0.5)*160; n.y=c[1]+(rnd()-0.5)*160;
  n.vx=0;n.vy=0;
});

function simStep(){
  const N=nodes.length;
  for(let i=0;i<N;i++){ const a=nodes[i];
    for(let j=i+1;j<N;j++){ const b=nodes[j];
      let dx=a.x-b.x, dy=a.y-b.y;
      let d2=dx*dx+dy*dy+0.01; if(d2>90000) continue;
      const f=3400/d2; const d=Math.sqrt(d2);
      dx/=d;dy/=d;
      a.vx+=dx*f; a.vy+=dy*f;
      b.vx-=dx*f; b.vy-=dy*f;
    }}
  links.forEach(l=>{
    const rest=l.kind==='cc'?85:120, k=0.02;
    let dx=l.b.x-l.a.x, dy=l.b.y-l.a.y;
    const d=Math.sqrt(dx*dx+dy*dy)+0.01;
    const f=k*(d-rest)/d;
    l.a.vx+=dx*f; l.a.vy+=dy*f;
    l.b.vx-=dx*f; l.b.vy-=dy*f;
  });
  nodes.forEach(n=>{
    if(n.type==='c'){ const c=THEMES[n.t].c;
      n.vx+=(c[0]-n.x)*0.010; n.vy+=(c[1]-n.y)*0.010; }
    n.vx-=n.x*0.0006; n.vy-=n.y*0.0006;
    n.vx*=0.80;n.vy*=0.80;
    n.x+=n.vx; n.y+=n.vy;
  });
}
for(let i=0;i<420;i++) simStep(); // frozen layout — same every visit

// per-theme cluster stats for territory rendering
const clusters={};
Object.keys(THEMES).forEach(k=>{
  const ns=nodes.filter(n=>n.type==='c'&&n.t===k);
  const mx=ns.reduce((s,n)=>s+n.x,0)/ns.length, my=ns.reduce((s,n)=>s+n.y,0)/ns.length;
  const r=Math.max(...ns.map(n=>Math.hypot(n.x-mx,n.y-my)));
  clusters[k]={x:mx,y:my,r:r+55,ns};
});

/* theme label position: a uniform gap beyond the cluster's outermost
   node measured along the label's own direction — balanced by construction */
function themeLabelPos(k){
  const cl=clusters[k];
  const d=Math.hypot(cl.x,cl.y);
  if(d<80) return null; // Foundations: watermark at centroid
  let ux=cl.x/d, uy=cl.y/d;
  if(THEMES[k].la!==undefined){ const a=THEMES[k].la*Math.PI/180; ux=Math.cos(a); uy=Math.sin(a); }
  const extent=Math.max(0,...cl.ns.map(n=>(n.x-cl.x)*ux+(n.y-cl.y)*uy));
  const pad=THEMES[k].lp!==undefined?THEMES[k].lp:70;
  return [cl.x+ux*(extent+pad), cl.y+uy*(extent+pad)];
}

let hoverId=null, selectedId=null;
let view='map';
const themeOn={}; Object.keys(THEMES).forEach(k=>themeOn[k]=true);
const isMobile=()=>innerWidth<=860;
const PANEL_W=424; // panel width + margins

function resize(){ DPR=Math.min(devicePixelRatio||1,2); W=innerWidth; H=innerHeight;
  cv.width=W*DPR; cv.height=H*DPR; cv.style.width=W+'px'; cv.style.height=H+'px'; dirty=true; }
addEventListener('resize',resize); resize();

function centerX(){ return isMobile()? W/2 : PANEL_W+(W-PANEL_W-16)/2; }
function centerY(){ return (H+58)/2; } // usable area starts below the header
function toScreen(x,y){ return [(x-cam.x)*cam.z+centerX(), (y-cam.y)*cam.z+centerY()]; }
function toWorld(sx,sy){ return [(sx-centerX())/cam.z+cam.x, (sy-centerY())/cam.z+cam.y]; }

function labelPoints(){
  return Object.keys(clusters).filter(k=>themeOn[k]).map(themeLabelPos).filter(Boolean);
}
function fit(){
  const vis=nodes.filter(nodeVisible);
  const xs=vis.map(n=>n.x), ys=vis.map(n=>n.y);
  labelPoints().forEach(([lx,ly])=>{ xs.push(lx-160,lx+160); ys.push(ly-45,ly+45); });
  const x0=Math.min(...xs)-40,x1=Math.max(...xs)+40,y0=Math.min(...ys)-30,y1=Math.max(...ys)+40;
  const availW=(isMobile()?W:W-PANEL_W-16)-70, availH=H-(isMobile()?300:170);
  const z=Math.min(availW/(x1-x0+1),availH/(y1-y0+1),1.15);
  return {x:(x0+x1)/2, y:(y0+y1)/2+20, z};
}
function goTo(t,instant){ if(instant||reduceMotion){ cam={...t}; camT=null; } else camT={...t}; dirty=true; }

function nodeVisible(n){ if(n.type==='s') return n.concepts.some(cid=>byId[cid]&&themeOn[byId[cid].t]); return themeOn[n.t]; }
function hexA(hex,a){ const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`; }
function nodeColor(n){ return n.type==='s' ? '#EDF1F8' : THEMES[n.t].color; }
function nodeR(n){ return (n.type==='s' ? 11 : 4.2+Math.min(n.deg,14)*0.42) * Math.pow(cam.z,0.55); }

function activeSet(){
  const f=hoverId||selectedId; if(!f) return null;
  const s=new Set([f]); neighbors[f].forEach(x=>s.add(x)); return s;
}

const MONO=getComputedStyle(document.documentElement).getPropertyValue('--f-mono');

function draw(){
  ctx.setTransform(DPR,0,0,DPR,0,0);
  ctx.clearRect(0,0,W,H);
  const act=activeSet();

  Object.entries(clusters).forEach(([k,cl])=>{
    if(!themeOn[k])return;
    const [sx,sy]=toScreen(cl.x,cl.y); const sr=cl.r*cam.z*1.25;
    const g=ctx.createRadialGradient(sx,sy,sr*0.15,sx,sy,sr);
    g.addColorStop(0,hexA(THEMES[k].color,0.055)); g.addColorStop(1,hexA(THEMES[k].color,0));
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(sx,sy,sr,0,7); ctx.fill();
    // theme name at the perimeter, along the ray from map center through the cluster
    const dist=Math.hypot(cl.x,cl.y);
    const nm=THEMES[k].name.toUpperCase();
    ctx.textAlign='center'; ctx.textBaseline='middle';
    if(dist<80){ // Foundations: watermark on its own cluster, behind the nodes
      const [lx,ly]=toScreen(cl.x,cl.y);
      const fs=Math.min(Math.max(13,16*cam.z),24);
      ctx.font=`700 ${fs}px ${MONO}`;
      ctx.fillStyle=hexA(THEMES[k].color, act?0.06:0.16);
      ctx.fillText(nm,lx,ly);
    } else {
      const [wx,wy]=themeLabelPos(k);
      const [lx,ly]=toScreen(wx,wy);
      const fs=Math.min(Math.max(13,17*cam.z),26);
      ctx.font=`700 ${fs}px ${MONO}`;
      ctx.fillStyle=hexA(THEMES[k].color, act?0.14:0.55);
      if(nm.includes(' & ')){
        const [a,b]=nm.split(' & ');
        ctx.fillText(a+' &',lx,ly-fs*0.62);
        ctx.fillText(b,lx,ly+fs*0.62);
      } else ctx.fillText(nm,lx,ly);
    }
  });

  nodes.forEach(n=>{ const [sx,sy]=toScreen(n.x,n.y); n.sx=sx; n.sy=sy; });
  links.forEach(l=>{
    if(!nodeVisible(l.a)||!nodeVisible(l.b)) return;
    const focus=hoverId||selectedId;
    const inAct = act && (l.a.id===focus||l.b.id===focus);
    const isVS=l.kind==='vs';
    let alpha=isVS?0.38:(l.kind==='cc'?0.15:0.08);
    if(act){ alpha = inAct?(isVS?0.85:0.55):alpha*0.18; }
    if(isVS){ ctx.strokeStyle=hexA('#E85D6A',alpha); ctx.lineWidth=inAct?1.7:1.1; ctx.setLineDash([5,4]); }
    else if(inAct){ const c=l.a.type==='c'?THEMES[l.a.t].color:(l.b.type==='c'?THEMES[l.b.t].color:'#EDF1F8');
      ctx.strokeStyle=hexA(c,alpha); ctx.lineWidth=1.4; }
    else { ctx.strokeStyle=`rgba(126,146,190,${alpha})`; ctx.lineWidth=1; }
    ctx.beginPath(); ctx.moveTo(l.a.sx,l.a.sy); ctx.lineTo(l.b.sx,l.b.sy); ctx.stroke();
    if(isVS) ctx.setLineDash([]);
  });

  const labelJobs=[];
  nodes.forEach(n=>{
    if(!nodeVisible(n)) return;
    const r=nodeR(n);
    const isFocus=n.id===hoverId||n.id===selectedId;
    let alpha=1;
    if(act&&!act.has(n.id)) alpha=0.14;
    const col=nodeColor(n);
    if(n.type==='s'){
      ctx.fillStyle=hexA('#0D1220',alpha);
      ctx.strokeStyle=hexA(col,alpha*0.95); ctx.lineWidth=1.7;
      ctx.beginPath(); ctx.arc(n.sx,n.sy,r,0,7); ctx.fill(); ctx.stroke();
      ctx.fillStyle=hexA(col,alpha);
      ctx.font=`700 ${Math.max(8.5,r*0.9)}px ${MONO}`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(n.n,n.sx,n.sy+0.5);
    } else {
      if(isFocus){ ctx.fillStyle=hexA(col,0.15);
        ctx.beginPath(); ctx.arc(n.sx,n.sy,r+8,0,7); ctx.fill(); }
      ctx.fillStyle=hexA(col,alpha);
      ctx.beginPath(); ctx.arc(n.sx,n.sy,r,0,7); ctx.fill();
    }
    if(isFocus){ ctx.strokeStyle='rgba(255,255,255,0.85)'; ctx.lineWidth=1.4;
      ctx.beginPath(); ctx.arc(n.sx,n.sy,r+3.5,0,7); ctx.stroke(); }
    labelJobs.push({n,r,alpha,col,isFocus,inAct:act?act.has(n.id):false});
  });

  labelJobs.sort((a,b)=>{
    const pa=(a.isFocus?4:0)+(a.inAct?2:0)+(a.n.type==='s'?1:0);
    const pb=(b.isFocus?4:0)+(b.inAct?2:0)+(b.n.type==='s'?1:0);
    if(pa!==pb) return pb-pa; return b.n.deg-a.n.deg;
  });
  const placed=[];
  labelJobs.forEach(j=>{
    const n=j.n;
    if(j.alpha<0.2 && !j.isFocus) return;
    const fs=n.type==='s'?10.5:10;
    ctx.font=`${n.type==='s'?'700':'400'} ${fs}px ${MONO}`;
    const txt=n.type==='s'?n.name.toUpperCase():n.name;
    const w=ctx.measureText(txt).width;
    const lx=n.sx+j.r+6, ly=n.sy;
    const box={x:lx-2,y:ly-fs*0.72,w:w+4,h:fs*1.45};
    if(!j.isFocus && placed.some(p=>!(box.x>p.x+p.w||p.x>box.x+box.w||box.y>p.y+p.h||p.y>box.y+box.h))) return;
    if(box.x>W||box.x+box.w<0||box.y>H||box.y+box.h<0) return;
    placed.push(box);
    ctx.textAlign='left'; ctx.textBaseline='middle';
    ctx.fillStyle='rgba(8,11,18,0.74)';
    ctx.fillRect(box.x,box.y,box.w,box.h);
    if(j.isFocus||j.inAct) ctx.fillStyle = n.type==='s' ? '#EDF1F8' : hexA(j.col,1);
    else ctx.fillStyle = n.type==='s' ? hexA('#D7DEEC',0.8*j.alpha) : hexA(j.col,0.82*j.alpha);
    ctx.fillText(txt,lx,ly);
  });
}

/* ---------- interaction ---------- */
let dragging=false,px=0,py=0,moved=0,pinchD=0;
stage.addEventListener('pointerdown',e=>{
  if(e.button!==0&&e.pointerType==='mouse')return;
  dragging=true;moved=0;px=e.clientX;py=e.clientY;
  stage.classList.add('dragging'); stage.setPointerCapture(e.pointerId);
});
stage.addEventListener('pointermove',e=>{
  if(dragging){
    const dx=e.clientX-px,dy=e.clientY-py; moved+=Math.abs(dx)+Math.abs(dy);
    cam.x-=dx/cam.z; cam.y-=dy/cam.z; camT=null; px=e.clientX;py=e.clientY; dirty=true;
  } else {
    const id=pick(e.clientX,e.clientY);
    if(id!==hoverId){ hoverId=id; stage.style.cursor=id?'pointer':'grab'; dirty=true; }
  }
});
stage.addEventListener('pointerup',e=>{
  stage.classList.remove('dragging');
  if(dragging&&moved<6){
    const id=pick(e.clientX,e.clientY);
    if(id) select(id); else if(selectedId) deselect();
  }
  dragging=false;
});
stage.addEventListener('dblclick',e=>{
  const id=pick(e.clientX,e.clientY);
  if(!id){ selectedId=null; showHome(); goTo(fit()); }
});
stage.addEventListener('wheel',e=>{
  e.preventDefault();
  const f=Math.exp(-e.deltaY*0.0007); // proportional to scroll amount — gentle on trackpads and wheels
  const z2=Math.max(0.22,Math.min(4,cam.z*f));
  const [wx,wy]=toWorld(e.clientX,e.clientY);
  cam.x=wx-(e.clientX-centerX())/z2;
  cam.y=wy-(e.clientY-centerY())/z2;
  cam.z=z2; camT=null; dirty=true;
},{passive:false});
stage.addEventListener('touchstart',e=>{ if(e.touches.length===2){
  pinchD=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY); }},{passive:true});
stage.addEventListener('touchmove',e=>{ if(e.touches.length===2){
  const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
  if(pinchD>0){ cam.z=Math.max(0.22,Math.min(4,cam.z*(d/pinchD))); dirty=true; }
  pinchD=d; dragging=false; e.preventDefault(); }},{passive:false});

function pick(mx,my){
  let best=null,bd=1e9;
  nodes.forEach(n=>{
    if(!nodeVisible(n))return;
    const r=Math.max(nodeR(n),7)+4;
    const d=(n.sx-mx)**2+(n.sy-my)**2;
    if(d<r*r&&d<bd){bd=d;best=n.id;}
  });
  return best;
}

function frame(){
  if(camT){
    cam.x+=(camT.x-cam.x)*0.16; cam.y+=(camT.y-cam.y)*0.16; cam.z+=(camT.z-cam.z)*0.16;
    if(Math.abs(camT.x-cam.x)<0.4&&Math.abs(camT.y-cam.y)<0.4&&Math.abs(camT.z-cam.z)<0.002) camT=null;
    dirty=true;
  }
  if(dirty&&view==='map'){ draw(); dirty=false; }
  requestAnimationFrame(frame);
}
goTo(fit(),true);
draw(); dirty=false;
requestAnimationFrame(frame);

/* ============================================================
   UI — single left panel (home ⇄ detail), walks, matrix
   ============================================================ */
const panel=document.getElementById('panelScroll');
const esc=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;');

function chipHTML(id){
  const n=byId[id]; if(!n)return'';
  if(n.type==='s') return `<button class="chip src" data-go="${id}"><span class="dot" style="background:#EDF1F8"></span>${n.n}. ${esc(n.name)}</button>`;
  return `<button class="chip" data-go="${id}"><span class="dot" style="background:${THEMES[n.t].color}"></span>${esc(n.name)}</button>`;
}
function shortAuthors(s){
  return s.authors.split(',')[0].split(' &')[0]+(s.authors.includes(',')||s.authors.includes('&')?' et al.':'');
}

/* ---------- home ---------- */

  selectedId=null; dirty=true; syncMatrixSel();
  const walkedCount=SOURCES.filter(s=>doneWalks.has(s.id)).length;
  panel.innerHTML=`
   <div class="intro">
    <div class="eyebrow" style="color:var(--accent)">80,000 HOURS · ESSENTIAL AI RISK READING LIST</div>
    <h2 class="title">The AI risk conversation, as one web</h2>
    <p style="margin-top:10px">The concepts from 80,000 Hours' <em>11 essential resources on AI risk</em>. Explore a walk through each source's core claims. Dashed red lines are live disagreements between readings.</p>
    <div class="sect" style="color:var(--accent);border-top-color:rgba(127,166,232,.35)">THE 11 READINGS${walkedCount?` · ${walkedCount}/11 WALKED`:' — PICK ONE TO START'}</div>
    <div id="homeReads">${SOURCES.map(s=>{
      const done=doneWalks.has(s.id);
      return `<button class="rd${done?' done':''}" data-go="${s.id}">
        <span class="num">${String(s.n).padStart(2,'0')}</span>
        <span class="rb"><b>${esc(s.name)}</b><span>${esc(shortAuthors(s))} · ${s.year} · ${WALKS[s.id].length}-stop walk</span></span>
        <span class="mark">${done?'✓':'▸'}</span></button>`;}).join('')}</div>
    <div class="sect">THEMES — CLICK TO FILTER</div>
    <div id="legend">
      ${Object.entries(THEMES).map(([k,t])=>{
        const count=CONCEPTS.filter(c=>c.t===k).length;
        return `<div class="lg${themeOn[k]?'':' off'}" data-t="${k}"><span class="dot" style="background:${t.color}"></span>${t.name}<span class="n">${count}</span></div>`;}).join('')}
      <div id="legendHint">click to toggle · shift-click to isolate</div>
    </div>
    <a class="linkout" href="https://80000hours.org/articles/11-essential-resources-ai-risk/" target="_blank" rel="noopener">SOURCE LIST — 80000HOURS.ORG ↗</a>
    <p style="margin-top:12px;font-size:10.5px;line-height:1.5;color:var(--faint)">Note: this is a personal project with no official association with 80,000 Hours.</p>
   </div>`;
}

/* ---------- detail ---------- */
function renderNode(id){
  const n=byId[id]; if(!n)return;
  if(n.type==='s'){
    const stops=WALKS[n.id]||[];
    const relC=n.concepts.filter(c=>byId[c]);
    const done=doneWalks.has(n.id);
    panel.innerHTML=`
      <button class="backBtn" data-back>${backLabel()}</button>
      <div class="eyebrow" style="color:#D7DEEC"><span class="dot" style="background:#EDF1F8"></span>READING ${String(n.n).padStart(2,'0')} OF 11</div>
      <h2 class="title"><a class="titleLink" href="${n.url}" target="_blank" rel="noopener">${esc(n.name)} <span class="tl">↗</span></a></h2>
      <div class="byline">${esc(n.authors)}${n.org?' · '+esc(n.org):''} · ${n.year}</div>
      <div class="ctaRow">
        <button class="walkBtn${done?' done':''}" data-walk="${n.id}">${done?'✓ WALKED — AGAIN ▸':`WALK ITS ${stops.length} KEY CONCEPTS ▸`}</button>
        <a class="linkout" href="${n.url}" target="_blank" rel="noopener">READ ↗</a>
      </div>
      <p class="blurb">${esc(n.blurb)}</p>
      <div class="sect">Core claims</div>
      <ul class="claims">${n.claims.map(c=>`<li>${esc(c)}</li>`).join('')}</ul>
      <div class="sect">Concepts it anchors</div>
      <div class="chips">${relC.map(chipHTML).join('')}</div>`;
  } else {
    const th=THEMES[n.t];
    const srcs=(n.src||[]).filter(s=>byId[s]).sort((a,b)=>byId[a].n-byId[b].n);
    const tens=vsN[n.id]?[...vsN[n.id]]:[];
    const rels=[...neighbors[n.id]].filter(x=>byId[x].type==='c'&&!tens.includes(x));
    panel.innerHTML=`
      <button class="backBtn" data-back>${backLabel()}</button>
      <div class="eyebrow" style="color:${th.color}"><span class="dot" style="background:${th.color}"></span>${th.name.toUpperCase()}</div>
      <h2 class="title">${esc(n.name)}</h2>
      <p class="blurb" style="margin-top:8px">${esc(n.b)}</p>
      ${n.crux?`<div class="crux"><div class="cx-head">THE CRUX</div><p>${esc(n.crux)}</p></div>`:''}
      <div class="sect">Where it's argued (${srcs.length} reading${srcs.length!==1?'s':''})</div>
      <div class="chips">${srcs.map(chipHTML).join('')}</div>
      ${tens.length?`<div class="sect" style="color:#E85D6A">In tension with</div>
      <div class="chips">${tens.map(chipHTML).join('')}</div>`:''}
      <div class="sect">Adjacent concepts</div>
      <div class="chips">${rels.map(chipHTML).join('')}</div>`;
  }
  panel.scrollTop=0;
}
function select(id,push=true){
  selectedId=id; dirty=true;
  renderNode(id);
  const n=byId[id];
  if(view==='map'){
    const z=Math.max(cam.z,0.85);
    goTo({x:n.x,y:n.y,z});
  } else syncMatrixSel(true);
}
function deselect(){ selectedId=null; dirty=true; showHome(); if(view==='map') goTo(fit()); }
function goBack(){
  if(walk){ endWalk(); return; }
  deselect(); syncMatrixSel();
}
function backLabel(){ return walk ? '← EXIT WALK' : '← HOME'; }

/* panel delegation: back, walk, read, walk-nav, theme filter, node chips */
panel.addEventListener('click',e=>{
  if(e.target.closest('[data-back]')){ goBack(); return; }
  const wb=e.target.closest('[data-walk]'); if(wb){ startWalk(wb.dataset.walk); return; }
  const tn=e.target.closest('[data-tnav]'); if(tn){ walkNav(+tn.dataset.tnav); return; }
  const lg=e.target.closest('.lg[data-t]');
  if(lg){ const k=lg.dataset.t;
    if(e.shiftKey){ const solo=Object.keys(THEMES).every(x=>x===k?themeOn[x]:!themeOn[x]);
      Object.keys(THEMES).forEach(x=>themeOn[x]= solo?true:(x===k)); }
    else themeOn[k]=!themeOn[k];
    panel.querySelectorAll('.lg[data-t]').forEach(el=>el.classList.toggle('off',!themeOn[el.dataset.t]));
    applyMatrixFilter(); dirty=true; return; }
  const b=e.target.closest('[data-go]'); if(b) select(b.dataset.go);
});

/* ---------- walks ---------- */
let walk=null, walkIdx=0;
const trailBar=document.getElementById('trailBar');
function startWalk(sid){
  const stops=WALKS[sid]; if(!stops)return;
  walk={src:byId[sid], stops}; walkIdx=0; setView('map');
  showWalkStop();
}
function showWalkStop(){
  const st=walk.stops[walkIdx];
  select(st.id,false); injectNote(); renderWalkBar();
}
function injectNote(){
  const st=walk.stops[walkIdx];
  const div=document.createElement('div'); div.className='trailNote';
  div.innerHTML=`<div class="tn-head">READING ${String(walk.src.n).padStart(2,'0')} — ${esc(walk.src.name.toUpperCase())} · STOP ${walkIdx+1} OF ${walk.stops.length}</div>
    <p>${esc(st.note)}</p>
    <div class="tn-nav">${walkIdx>0?'<button data-tnav="-1">← PREV</button>':''}
    <button data-tnav="1">${walkIdx<walk.stops.length-1?'NEXT STOP →':'FINISH WALK ✓'}</button></div>`;
  panel.prepend(div); panel.scrollTop=0;
}
function walkNav(d){
  if(!walk)return;
  const ni=walkIdx+d;
  if(ni>=walk.stops.length){ doneWalks.add(walk.src.id); saveWalks(); endWalk(); return; }
  if(ni<0)return;
  walkIdx=ni; showWalkStop();
}
function endWalk(){
  const sid=walk?walk.src.id:null;
  walk=null; trailBar.classList.remove('show');
  if(sid){ select(sid,false); } else deselect();
}
function renderWalkBar(){
  trailBar.classList.add('show');
  trailBar.innerHTML=`<span class="tb-label">R${walk.src.n} · ${esc(walk.src.name.toUpperCase())} · ${walkIdx+1}/${walk.stops.length}</span>
    <button data-tnav="-1" ${walkIdx===0?'disabled':''}>←</button>
    <button data-tnav="1">${walkIdx<walk.stops.length-1?'→':'✓'}</button>
    <button data-tend title="Exit walk">✕</button>`;
}
trailBar.addEventListener('click',e=>{
  if(e.target.closest('[data-tend]')){ endWalk(); return; }
  const b=e.target.closest('[data-tnav]'); if(b&&!b.disabled) walkNav(+b.dataset.tnav);
});

/* ---------- search ---------- */
const search=document.getElementById('search'), results=document.getElementById('searchResults');
let srIndex=-1;
function runSearch(){
  const q=search.value.trim().toLowerCase();
  if(!q){ results.classList.remove('open'); return; }
  const hits=nodes.filter(n=>{
    const hay=(n.name+' '+(n.b||n.blurb||'')+' '+(n.authors||'')).toLowerCase();
    return hay.includes(q);
  }).sort((a,b)=>{
    const an=a.name.toLowerCase().indexOf(q), bn=b.name.toLowerCase().indexOf(q);
    return (an<0?99:an)-(bn<0?99:bn);
  }).slice(0,9);
  srIndex=-1;
  results.innerHTML=hits.map(n=>{
    const col=n.type==='s'?'#EDF1F8':THEMES[n.t].color;
    const tag=n.type==='s'?'READING '+n.n:THEMES[n.t].name.toUpperCase();
    return `<button class="sr" data-go="${n.id}"><span class="dot" style="background:${col}"></span>${esc(n.name)}<small>${tag}</small></button>`;
  }).join('')||'<div style="padding:10px 12px;font-size:12px;color:var(--faint)">no matches</div>';
  results.classList.add('open');
}
search.addEventListener('input',runSearch);
search.addEventListener('keydown',e=>{
  const items=[...results.querySelectorAll('.sr')];
  if(e.key==='ArrowDown'){ srIndex=Math.min(srIndex+1,items.length-1); e.preventDefault(); }
  else if(e.key==='ArrowUp'){ srIndex=Math.max(srIndex-1,0); e.preventDefault(); }
  else if(e.key==='Enter'){ const t=items[srIndex]||items[0]; if(t){ select(t.dataset.go); results.classList.remove('open'); search.blur(); } return; }
  else if(e.key==='Escape'){ results.classList.remove('open'); search.blur(); return; }
  items.forEach((el,i)=>el.classList.toggle('active',i===srIndex));
});
results.addEventListener('click',e=>{ const b=e.target.closest('[data-go]');
  if(b){ select(b.dataset.go); results.classList.remove('open'); search.value=''; }});
document.addEventListener('click',e=>{ if(!e.target.closest('#searchWrap')) results.classList.remove('open'); });
document.addEventListener('keydown',e=>{
  if(e.key==='/'&&document.activeElement!==search){ e.preventDefault(); search.focus(); }
  if(e.key==='Escape'&&document.activeElement!==search){ goBack(); }
  if(walk&&document.activeElement!==search){
    if(e.key==='ArrowRight'){ e.preventDefault(); walkNav(1); }
    if(e.key==='ArrowLeft'){ e.preventDefault(); walkNav(-1); }
  }
});

/* ---------- matrix ---------- */
const mtable=document.getElementById('mtable'), matrixWrap=document.getElementById('matrixWrap');
const SHORT={s1:'MacAskill & Moorhouse',s2:'AI 2027',s3:'Situational Awareness',s4:'Erdil (Epoch)',
 s5:'Most Important Century',s6:'Cotra × Narayanan',s7:'Epoch: Scaling to 2030',s8:'Carlsmith',
 s9:'Gradual Disempowerment',s10:'Taking AI Welfare Seriously',s11:'Machines of Loving Grace'};
function buildMatrix(){
  let html='<thead><tr><th class="cname">CONCEPT ▾ / READING ▸</th>';
  SOURCES.forEach(s=>{
    html+=`<th data-go="${s.id}" title="${esc(s.name)} — ${esc(s.authors)} (${s.year})"><span class="mh"><b>${String(s.n).padStart(2,'0')}</b>${esc(SHORT[s.id])}</span></th>`;
  });
  html+='</tr></thead>';
  Object.entries(THEMES).forEach(([k,t])=>{
    html+=`<tbody data-t="${k}"><tr class="throw"><td class="cname" style="color:${t.color}">${t.name.toUpperCase()}</td><td colspan="${SOURCES.length}"></td></tr>`;
    CONCEPTS.filter(c=>c.t===k).forEach(c=>{
      html+=`<tr data-cid="${c.id}"><td class="cname" data-go="${c.id}"><span class="dot" style="background:${t.color}"></span>${esc(c.name)}</td>`;
      SOURCES.forEach(s=>{
        html+= covers.has(c.id+'|'+s.id)
          ? `<td><span class="cdot" data-go="${c.id}" style="background:${t.color}" title="${esc(c.name)} · in ${esc(s.name)}"></span></td>`
          : `<td><span class="cd-empty">·</span></td>`;
      });
      html+=`</tr>`;
    });
    html+='</tbody>';
  });
  mtable.innerHTML=html;
}
buildMatrix();
mtable.addEventListener('click',e=>{
  const g=e.target.closest('[data-go]'); if(g) select(g.dataset.go);
});
function applyMatrixFilter(){
  mtable.querySelectorAll('tbody').forEach(tb=>{
    tb.style.display=themeOn[tb.dataset.t]?'':'none';
  });
}
function syncMatrixSel(scroll){
  mtable.querySelectorAll('tr.sel').forEach(r=>r.classList.remove('sel'));
  if(!selectedId) return;
  const row=mtable.querySelector(`tr[data-cid="${selectedId}"]`);
  if(row){ row.classList.add('sel'); if(scroll&&view==='matrix') row.scrollIntoView({block:'nearest'}); }
}

/* ---------- view tabs ---------- */
const tabMap=document.getElementById('tabMap'), tabMatrix=document.getElementById('tabMatrix');
function setView(v){
  view=v;
  tabMap.classList.toggle('on',v==='map');
  tabMatrix.classList.toggle('on',v==='matrix');
  matrixWrap.classList.toggle('show',v==='matrix');
  stage.style.display=v==='map'?'':'none';
  if(v==='map') dirty=true; else syncMatrixSel(true);
}
tabMap.addEventListener('click',()=>setView('map'));
tabMatrix.addEventListener('click',()=>setView('matrix'));

showHome();
</script>
